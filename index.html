<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خريطة Waterman Butterfly متعددة الطبقات</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4/dist/d3-geo-projection.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    
    <script>
        (function() {
            var basePath = window.location.pathname.replace(/\/[^\/]*$/, '/');
            var link = document.createElement('link');
            link.rel = 'manifest';
            link.href = basePath + 'manifest.json';
            document.head.appendChild(link);
            window.__BASE_PATH = basePath;
        })();

        :root {
            --bg: #1a1d23;
            --panel-bg: #21252b;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border: #333842;
            --btn-bg: #2a2d35;
            --btn-hover: #353a45;
            --btn-active: #3a4458;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --transition: 0.3s ease;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:'Segoe UI','Noto Sans Arabic',Tahoma,sans-serif;color:var(--text);overflow:hidden;height:100vh;width:100vw;display:flex;flex-direction:column;user-select:none;}
        .header{background:var(--panel-bg);border-bottom:1px solid var(--border);padding:8px 12px;padding-top:calc(8px + env(safe-area-inset-top, 10px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;box-shadow:var(--shadow);gap:6px;flex-wrap:nowrap;}
        .header .title-group{display:flex;align-items:center;gap:6px;flex-shrink:1;min-width:0;}
        .header .logo-icon{font-size:20px;}
        .header h1{font-size:0.9em;font-weight:700;background:linear-gradient(135deg,#e0e0e0,#b0c4de);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
        .header .subtitle{display:none;}
        .control-group{display:flex;align-items:center;gap:2px;flex-wrap:wrap;}
        .control-label{font-size:0.5em;color:var(--text-secondary);font-weight:600;text-transform:uppercase;white-space:nowrap;display:none;}
        .btn{padding:4px 8px;border:1px solid var(--border);border-radius:14px;background:var(--btn-bg);color:var(--text);cursor:pointer;font-size:0.6em;font-weight:500;transition:var(--transition);white-space:nowrap;font-family:inherit;outline:none;}
        .btn:hover{background:var(--btn-hover);border-color:#555;transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,0.3);}
        .btn.active{box-shadow:0 0 0 2px rgba(77,166,255,0.35);background:var(--btn-active);font-weight:700;color:#fff;}
        .mode-btn.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,0.25);background:#3a4050;}
        .toggle-on{background:#2a3a40;border-color:#4a7a6a;color:#c0e0d0;}
        .divider{width:1px;height:16px;background:var(--border);margin:0 2px;border-radius:1px;flex-shrink:0;}
        .map-container{flex:1;position:relative;cursor:grab;overflow:hidden;background:radial-gradient(ellipse at center, #1a2840 0%, #0d1520 100%);}
        .map-container:active{cursor:grabbing;}
        .map-container svg{display:block;width:100%;height:100%;}
        .tooltip{position:absolute;pointer-events:none;background:rgba(20,24,32,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:6px 10px;color:#fff;font-size:0.7em;box-shadow:0 8px 24px rgba(0,0,0,0.6);backdrop-filter:blur(10px);z-index:100;opacity:0;transition:opacity 0.15s;max-width:200px;text-align:center;}
        .tooltip.visible{opacity:1;}
        .legend{position:fixed;bottom:80px;left:16px;background:rgba(20,24,32,0.9);border:1px solid var(--border);border-radius:10px;padding:10px 14px;z-index:999;font-size:0.7em;display:flex;flex-direction:column;gap:4px;backdrop-filter:blur(8px);box-shadow:var(--shadow);max-height:50vh;overflow-y:auto;}
        .legend-color{width:10px;height:10px;border-radius:2px;border:1px solid rgba(255,255,255,0.2);}
        .legend-item{display:flex;align-items:center;gap:4px;white-space:nowrap;}
        .info-overlay{display:none;}
        .zoom-controls{position:fixed;bottom:80px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:999;}
        .zoom-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:rgba(20,24,32,0.9);color:#fff;cursor:pointer;font-size:0.9em;display:flex;align-items:center;justify-content:center;transition:var(--transition);backdrop-filter:blur(8px);box-shadow:var(--shadow);}
        .zoom-btn:hover{background:rgba(40,46,58,0.95);transform:scale(1.08);}
        .search-box{position:relative;display:flex;align-items:center;}
        .search-box input{width:80px;padding:3px 8px;border-radius:14px;background:var(--btn-bg);color:var(--text);border:1px solid var(--border);font-size:0.6em;outline:none;font-family:inherit;}
        .suggestions-list{position:absolute;top:100%;right:0;background:var(--panel-bg);border:1px solid var(--border);border-radius:6px;max-height:150px;overflow-y:auto;z-index:50;list-style:none;display:none;width:140px;font-size:0.6em;}
        .suggestions-list li{padding:4px 8px;cursor:pointer;color:var(--text);}
        .suggestions-list li:hover{background:var(--btn-hover);}
        .country-panel{position:absolute;top:30px;left:50%;transform:translateX(-50%);background:rgba(20,24,32,0.95);border:1px solid var(--border);border-radius:10px;padding:10px 14px;z-index:30;color:#fff;font-size:0.7em;backdrop-filter:blur(12px);box-shadow:var(--shadow);display:none;text-align:center;max-width:280px;min-width:180px;}
        .country-panel .close-btn,.country-panel .export-btn{font-size:0.9em;padding:0 4px;}
        .coordinates-display{display:none;}
        .copy-notification{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(46,125,50,0.9);color:#fff;padding:4px 14px;border-radius:16px;font-size:0.7em;z-index:200;opacity:0;transition:opacity 0.3s ease;pointer-events:none;}
        .copy-notification.show{opacity:1;}
        @media(max-width:768px){
            .header h1{font-size:0.8em;}
            .btn{padding:3px 6px;font-size:0.55em;border-radius:10px;}
            .control-label{display:none;}
            .divider{margin:0 1px;}
            .search-box input{width:60px;font-size:0.55em;}
            .legend{font-size:0.5em;padding:4px 6px;}
            .zoom-btn{width:24px;height:24px;font-size:0.8em;}
            .country-panel{top:20px;max-width:200px;padding:8px 10px;}
            .tooltip{font-size:0.6em;max-width:160px;padding:4px 8px;}
        }

        .menu-toggle {
            position: fixed;
            bottom: 90px;
            right: 80px;
            left: auto;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .menu-toggle:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
        }
        .menu-toggle.active {
            background: var(--btn-active);
            border-color: #fff;
        }

        .controls-bar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            max-width: 92vw;
            background: rgba(20, 24, 32, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 16px;
            z-index: 998;
            display: none;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            max-height: 60vh;
            overflow-y: auto;
        }
        .controls-bar.active {
            display: flex;
        }
        .controls-bar .row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .controls-bar .row-label {
            font-size: 0.6em;
            color: var(--text-secondary);
            font-weight: 600;
            margin-left: 4px;
            white-space: nowrap;
        }
        .controls-bar .btn {
            padding: 6px 10px;
            font-size: 0.7em;
            border-radius: 20px;
            min-height: 32px;
        }
        .controls-bar .control-group {
            gap: 4px;
        }
        .controls-bar .search-box input {
            width: 100px;
            padding: 4px 10px;
            font-size: 0.7em;
        }
        .controls-bar .control-label,
        .controls-bar .divider {
            display: none;
        }

        .country-label {
            font-size: 7px;
            font-weight: 600;
            fill: #e0e0e0;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6);
        }
        .capital-label {
            font-size: 6px;
            fill: #fff;
            text-anchor: start;
            dominant-baseline: central;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0,0,0,0.9);
            font-weight: 500;
        }
        .corridor-dot {
            fill: #ff9100;
            stroke: #fff;
            stroke-width: 0.5;
            vector-effect: non-scaling-stroke;
        }
        .capital-dot {
            fill: #ffd700;
            stroke: #000;
            stroke-width: 0.5;
            vector-effect: non-scaling-stroke;
        }
        .capital-halo {
            fill: #ffd700;
            opacity: 0.25;
            vector-effect: non-scaling-stroke;
        }
        .highlighted-country {
            filter: drop-shadow(0 0 8px #ffd700);
            stroke: #ffd700 !important;
            stroke-width: 2 !important;
        }
        .corridor-line {
            fill: none;
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
        }
        .corridor-glow {
            fill: none;
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            filter: drop-shadow(0 0 6px currentColor);
        }
        #mapSvg {
            will-change: transform;
        }
        .map-transform-group {
            will-change: transform;
        }

</head>
<body>
<div class="header">
    <div class="title-group">
        <span class="logo-icon">🦋</span>
        <div><h1>خريطة Waterman Butterfly</h1><span class="subtitle" style="font-size:0.7em;color:var(--text-secondary);">Interactive Multilayer Map</span></div>
    </div>
    <span style="font-size:0.7em;color:var(--text-secondary);">إسقاط ووترمان الفراشي</span>
</div>

<div class="map-container" id="mapContainer">
    <svg id="mapSvg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="legend" id="legend"></div>
    <div class="info-overlay" id="infoOverlay"></div>
    <div class="coordinates-display" id="coordinatesDisplay">خط الطول: — | خط العرض: —</div>
    <div class="country-panel" id="countryPanel">
        <button class="export-btn" id="exportBtn" title="تحميل">💾</button>
        <button class="close-btn" id="closePanelBtn">✖</button>
        <div id="panelContent"></div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn" title="تكبير">+</button>
        <button class="zoom-btn" id="zoomOutBtn" title="تصغير">−</button>
        <button class="zoom-btn" id="zoomResetBtn" title="إعادة">⌂</button>
    </div>
    <button class="menu-toggle" id="menuToggle" title="فتح القائمة">☰</button>

    <div class="controls-bar" id="controlsBar">
        <div class="row">
            <span class="row-label" id="rowLangLabel">🌐 اللغة:</span>
            <button class="btn" id="langToggle">English</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="بحث..." autocomplete="off">
                <ul class="suggestions-list" id="suggestionsList"></ul>
            </div>
            <button class="btn" id="copyLinkBtn" title="نسخ الرابط">📋</button>
            <button class="btn" id="resetBtn">↺ إعادة</button>
        </div>

        <div class="row">
            <span class="row-label" id="rowModeLabel">🎨 الوضع:</span>
            <div class="control-group" id="modeButtons">
                <button class="btn mode-btn active" data-mode="religion">🕌 دين</button>
                <button class="btn mode-btn" data-mode="terrain">🏔️ تضاريس</button>
                <button class="btn mode-btn" data-mode="density">👥 كثافة</button>
                <button class="btn mode-btn" data-mode="precipitation">🌧️ أمطار</button>
                <button class="btn mode-btn" data-mode="temperature">🌡️ حرارة</button>
                <button class="btn mode-btn" data-mode="normal">🌍 طبيعي</button>
            </div>
        </div>

        <div class="row">
            <span class="row-label" id="rowFilterLabel">🎯 التقسيم:</span>
            <div class="control-group" id="religionButtons">
                <button class="btn religion-btn active" data-religion="all">الكل</button>
                <button class="btn religion-btn" data-religion="muslim">مسلم</button>
                <button class="btn religion-btn" data-religion="christian">مسيحي</button>
                <button class="btn religion-btn" data-religion="hindu">هندوسي</button>
                <button class="btn religion-btn" data-religion="buddhist">بوذي</button>
                <button class="btn religion-btn" data-religion="jewish">يهودي</button>
                <button class="btn religion-btn" data-religion="other">آخر</button>
            </div>
        </div>

        <div class="row">
            <span class="row-label" id="rowKeysLabel">🔑 المفاتيح:</span>
            <button class="btn" id="sectToggle">☯️ الطوائف</button>
            <button class="btn" id="corridorsToggle">⛵ الممرات</button>
            <button class="btn" id="densitySpotsToggle">🔴 بؤر</button>
            <button class="btn" id="capitalsToggle">🏙️ عواصم</button>
            <button class="btn" id="timezonesToggle">🕐 مناطق</button>
        </div>
    </div>

    <div class="copy-notification" id="copyNotification"></div>
</div>

    function getContinent(name) {
        if (!name) return 'Unknown';
        const clean = getCleanName(name);
        if (continentByCountry[clean]) return continentByCountry[clean];
        if (continentByCountry[name]) return continentByCountry[name];
        const feature = allCountryFeatures.find(f => f.properties?.name === name || getCleanName(f.properties?.name) === clean);
        if (feature && feature.geometry) {
            const centroid = d3.geoCentroid(feature);
            if (centroid && !isNaN(centroid[0])) {
                const lat = centroid[1], lon = centroid[0];
                if (lat > 60) return 'Europe';
                if (lat < -50) return 'Antarctica';
                if (lon > -25 && lon < 50 && lat > -35 && lat < 37) return 'Africa';
                if (lon > -130 && lon < -60 && lat > 20) return 'North America';
                if (lon > -85 && lon < -30 && lat < 10) return 'South America';
                if (lon > 70 && lon < 150 && lat > 10) return 'Asia';
                if (lon > 110 && lon < 180 && lat < -10) return 'Oceania';
                if (lon > -10 && lon < 40 && lat > 35) return 'Europe';
                return 'Unknown';
            }
        }
        return 'Unknown';
    }

    function getCleanName(rawName) {
        if (!rawName) return '';
        return rawName
            .replace(/^(Islamic Republic of|Republic of|State of|Kingdom of|Federal Republic of|Democratic Republic of|Commonwealth of|People's Republic of|United States of America|United Kingdom of Great Britain and Northern Ireland)\s+/i, '')
            .replace(/\s*\(.*\)\s*/g, '')
            .replace(/^Rep\.\s*/i, '')
            .trim();
    }

    function getArabicName(enName) {
        if (!enName) return '';
        let clean = getCleanName(enName);
        if (arabicNames[clean]) return arabicNames[clean];
        if (arabicNames[enName]) return arabicNames[enName];
        for (let [k, v] of Object.entries(arabicNames))
            if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase())) return v;
        return enName;
    }

    function getReligion(name) {
        if (!name) return 'unknown';
        if (religionByCountry[name]) return religionByCountry[name];
        const clean = getCleanName(name);
        if (religionByCountry[clean]) return religionByCountry[clean];
        for (let [k, v] of Object.entries(religionByCountry))
            if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase())) return v;
        return 'unknown';
    }

        if (!name) return getReligion(name);
        if (denominationByCountry[name]) return denominationByCountry[name];
        const clean = getCleanName(name);
        if (denominationByCountry[clean]) return denominationByCountry[clean];
        for (let [k, v] of Object.entries(denominationByCountry))
            if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase())) return v;
        return getReligion(name);
    }

    function getElevation(name) {
        if (!name) return null;
        if (elevationByCountry[name] !== undefined) return elevationByCountry[name];
        const clean = getCleanName(name);
        if (elevationByCountry[clean] !== undefined) return elevationByCountry[clean];
        return Math.round(500 + Math.random() * 300);
    }

    function getDensity(name) {
        if (!name) return null;
        if (densityByCountry[name] !== undefined) return densityByCountry[name];
        const clean = getCleanName(name);
        if (densityByCountry[clean] !== undefined) return densityByCountry[clean];
        for (let [k, v] of Object.entries(densityByCountry))
            if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase())) return v;
        return 50;

    function getPrecipitation(name) {
        if (!name) return null;
        if (precipitationByCountry[name] !== undefined) return precipitationByCountry[name];
        const clean = getCleanName(name);
        if (precipitationByCountry[clean] !== undefined) return precipitationByCountry[clean];
        const feature = allCountryFeatures.find(f => f.properties?.name === name || getCleanName(f.properties?.name) === clean);
        if (feature && feature.geometry) {
            const centroid = d3.geoCentroid(feature);
            if (centroid && !isNaN(centroid[1])) {
                const lat = Math.abs(centroid[1]);
                let estimate = 2000 - 1800 * lat / 60;
                if (lat < 23 && centroid[0] > -20 && centroid[0] < 50) estimate = 100;
                if (lat < 25 && centroid[0] > 35 && centroid[0] < 55) estimate = 100;
                if (lat > 60) estimate = 500;
                return Math.round(estimate);
            }
        }
        return 800;
    }

    function getTemperature(name, d) {
        if (!name) return null;
        if (tempByCountry[name] !== undefined) return tempByCountry[name];
        const clean = getCleanName(name);
        if (tempByCountry[clean] !== undefined) return tempByCountry[clean];
        if (d && d.geometry) {
            const centroid = d3.geoCentroid(d);
            if (centroid && !isNaN(centroid[1])) {
                const lat = Math.abs(centroid[1]);
                let est = 28 - lat * 0.8;
                if (lat > 60) est = 28 - 60*0.8 - (lat-60)*1.2;
                if (lat > 80) est = -20;
                return Math.round(est);
            }
        }
        return null;
    }

    function createSvg() {

        const defs = svg.append('defs');
        defs.append('radialGradient').attr('id','oceanGradient').attr('cx','50%').attr('cy','50%').attr('r','60%')
            .selectAll('stop').data([{o:0,c:'#1e3048'},{o:100,c:'#0d1520'}]).join('stop').attr('offset',d=>d.o+'%').attr('stop-color',d=>d.c);
        gOcean = svg.append('g'); gOcean.append('rect').attr('x',-500).attr('y',-500).attr('width',width+1000).attr('height',height+1000).attr('fill','url(#oceanGradient)');
        gGraticule = svg.append('g'); gCountries = svg.append('g'); gPhysical = svg.append('g'); gCorridors = svg.append('g'); gTemperature = svg.append('g');
        gCapitals = svg.append('g'); gTimezones = svg.append('g');
        gMap = svg.append('g').attr('class', 'map-transform-group');
        [gOcean, gGraticule, gCountries, gPhysical, gCorridors, gTemperature, gCapitals, gTimezones].forEach(g => gMap.append(() => g.node()));
        projection = setupProjection(width, height); pathGen = d3.geoPath(projection);

    function drawCorridors() {
        gCorridors.selectAll('*').remove();

        corridorsData.forEach(c => {
            const points = c.coords;
            const glowPath = gCorridors.append('path')
                .datum({type:'LineString', coordinates: points})
                .attr('d', pathGen)
                .attr('class', 'corridor-glow')
                .attr('stroke', color)
                .attr('stroke-width', 8)
                .attr('opacity', 0.3);

                .datum({type:'LineString', coordinates: points})
                .attr('d', pathGen)
                .attr('class', 'corridor-line')
                .attr('stroke', color)
                .attr('stroke-width', 2.5)
                .attr('opacity', 0.9);

            const last = points[points.length-1];
            [first, last].forEach((p, idx) => {
                const [x, y] = projection(p);
                if (isNaN(x) || isNaN(y)) return;
                const r = 3.5;
                gCorridors.append('circle')
                    .attr('cx', x).attr('cy', y)
                    .attr('r', r)
                    .attr('fill', color)
                    .attr('stroke', '#fff')
                    .attr('stroke-width', 0.5)
                    .attr('vector-effect', 'non-scaling-stroke')
                    .attr('class', 'corridor-dot');
            });
            mainPath.on('mouseenter', () => {
                tooltip.innerHTML = `<strong>${lang === 'ar' ? c.name_ar : c.name_en}</strong><br>${t(c.type === 'sea' ? 'seaRoute' : 'landRoute')}`;
                tooltip.classList.add('visible');
            })
            .on('mousemove', e => {
                const r = mapContainer.getBoundingClientRect();
                tooltip.style.left = (e.clientX - r.left + 16) + 'px';
                tooltip.style.top = (e.clientY - r.top - 50) + 'px';
            })
            .on('mouseleave', () => tooltip.classList.remove('visible'));
        });
    }

    // ========== رسم العواصم (أحجام ثابتة) ==========
    function drawCapitals() {
        gCapitals.selectAll('*').remove();
        if (!capitalsVisible) return;
        Object.entries(countryInfo).forEach(([name, info]) => {
            if (!info.capital_coords) return;
            const [x, y] = projection(info.capital_coords);
            if (isNaN(x) || isNaN(y)) return;
            // أحجام ثابتة بغض النظر عن التكبير
            gCapitals.append('circle')
                .attr('cx', x).attr('cy', y)
                .attr('r', 8)
                .attr('class', 'capital-halo')
                .attr('fill', '#ffd700')
                .attr('opacity', 0.2)
                .attr('vector-effect', 'non-scaling-stroke');
            gCapitals.append('circle')
                .attr('cx', x).attr('cy', y)
                .attr('r', 3.5)
                .attr('class', 'capital-dot')
                .attr('fill', '#ffd700')
                .attr('stroke', '#000')
                .attr('stroke-width', 0.5)
                .attr('vector-effect', 'non-scaling-stroke');
            const label = lang === 'ar' ? info.capital_ar : info.capital_en;
            gCapitals.append('text')
                .attr('x', x + 8)
                .attr('y', y - 2)
                .attr('class', 'capital-label')
                .text(label)
                .attr('font-size', '6px')
                .attr('fill', '#fff')
                .attr('text-anchor', 'start')
                .attr('dominant-baseline', 'central')
                .attr('vector-effect', 'non-scaling-stroke');
        });
    }

    // ========== رسم تسميات الدول (أحجام ثابتة) ==========
    function drawCountryLabels(features) {
        if (countryLabelSelection) {
            countryLabelSelection.remove();
            countryLabelSelection = null;
        }
        const zoom = currentTransform.k;
        const labelGroup = gCountries.append('g').attr('class', 'country-label-group');
        const labels = [];
        features.forEach(d => {
            const name = d.properties?.name || '';
            const displayName = lang === 'ar' ? getArabicName(name) : name;
            const area = d3.geoArea(d);
            // عتبة أعلى قليلاً لتحسين الأداء
            if (area < 0.004 / zoom) return;
            
            let centroid;
            if (labelPositions[name]) {
                const [lon, lat] = labelPositions[name];
                centroid = projection([lon, lat]);
            } else {
                const c = d3.geoCentroid(d);
                centroid = projection(c);
            }
            if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) {
                try {
                    const c = d3.geoPath(projection).centroid(d);
                    if (c && !isNaN(c[0]) && !isNaN(c[1])) centroid = c;
                } catch(e) {}
            }
            if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) return;
            
            const x = centroid[0], y = centroid[1];
            const text = labelGroup.append('text')
                .attr('x', x).attr('y', y)
                .attr('class', 'country-label')
                .text(displayName)
                .attr('font-size', '7px') // حجم ثابت
                .attr('fill', '#e0e0e0')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .attr('vector-effect', 'non-scaling-stroke')
                .attr('style', 'text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6)');
            text.datum({ feature: d, area: area, name: name, displayName: displayName });
            labels.push(text);
        });
        countryLabelSelection = labelGroup.selectAll('.country-label');
    }

    function updateLabels() {
        if (!countryLabelSelection) return;
        const zoom = currentTransform.k;
        countryLabelSelection.each(function(d) {
            const el = d3.select(this);
            const data = el.datum();
            if (!data) return;
            const area = data.area;
            // فقط نضبط الرؤية (opacity) دون تغيير حجم الخط
            if (area < 0.004 / zoom) {
                el.style('opacity', 0);
            } else {
                el.style('opacity', 1);
                // تحديث النص إذا تغيرت اللغة (نادر)
                const newDisplay = lang === 'ar' ? getArabicName(data.name) : data.name;
                if (el.text() !== newDisplay) el.text(newDisplay);
            }
        });
    }

    // ========== تحسين حدث التكبير ==========
    function setupZoom() {
        const {width, height} = getContainerDimensions();
        zoomBehavior = d3.zoom().scaleExtent([0.5, 6]).translateExtent([[-width*0.8, -height*0.8], [width*1.8, height*1.8]])
            .on('zoom', e => { 
                currentTransform = e.transform; 
                gMap.attr('transform', currentTransform.toString()); 
                updateInfoOverlay(); 
                updateHash();
                if (zoomRAF) cancelAnimationFrame(zoomRAF);
                zoomRAF = requestAnimationFrame(() => {
                    updateLabels(); // فقط تحديث الرؤية
                    zoomRAF = null;
                });
            });
        svg.call(zoomBehavior); svg.on('dblclick.zoom', null);
    }

    // ========== بقية الدوال (مع تحسينات) ==========
    function renderCountries(features) {
        allCountryFeatures = features;
        ensureCountryData(features);
        countryNamesList = features.map(f => f.properties?.name || '').filter(n => n);
        gCountries.selectAll('*').remove();
        countryPaths = gCountries.selectAll('path')
            .data(features)
            .join('path')
            .attr('d', pathGen)
            .attr('fill', d => getCountryFill(d))
            .attr('stroke', d => getStroke(d))
            .attr('stroke-width', d => getStrokeWidth(d))
            .attr('opacity', d => getOpacity(d))
            .attr('cursor', 'pointer')
            .attr('vector-effect', 'non-scaling-stroke');

        countryPaths.on('mouseenter', function(e, d) {
            const name = d.properties?.name || '';
            let displayName = lang === 'ar' ? getArabicName(name) : name;
            const rel = getReligion(name); const denom = sectMode ? getDenomination(name) : null;
            let html = `<div class="country-name">${displayName}</div>`;
            if (colorMode === 'religion' && sectMode && denom) {
                const denomLabel = (lang === 'ar' && denominationArabic[denom]) ? denominationArabic[denom] : (lang === 'ar' && religionArabic[rel]) ? religionArabic[rel] : denom;
                html += `<div>${t('tooltipDenom')}: ${denomLabel}</div>`;
            } else if (colorMode === 'religion') {
                const relLabel = (lang === 'ar' && religionArabic[rel]) ? religionArabic[rel] : rel;
                html += `<div>${t('tooltipReligion')}: ${relLabel}</div>`;
            }
            if (colorMode === 'terrain') { const elev = getElevation(name); html += `<div>${t('tooltipElevation')}: ${elev !== null ? elev + ' ' + t('elevationUnit') : t('unknown')}</div>`; }
            if (colorMode === 'density') { const dens = getDensity(name); html += `<div>${t('tooltipDensity')}: ${dens !== null ? dens + ' ' + t('densityUnit') : t('unknown')}</div>`; }
            if (colorMode === 'precipitation') { const prec = getPrecipitation(name); html += `<div>${t('tooltipPrecipitation')}: ${prec !== null ? prec + ' ' + t('precipitationUnit') : t('unknown')}</div>`; }
            if (colorMode === 'temperature') { const temp = getTemperature(name, d); html += `<div>${t('temperature')}: ${temp !== null ? temp + '°C' : t('unknown')}</div>`; }
            tooltip.innerHTML = html; tooltip.classList.add('visible');
            d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5);
        })
        .on('mousemove', e => { const r = mapContainer.getBoundingClientRect(); tooltip.style.left = (e.clientX - r.left + 16) + 'px'; tooltip.style.top = (e.clientY - r.top - 50) + 'px'; })
        .on('mouseleave', function() { tooltip.classList.remove('visible'); d3.select(this).attr('stroke', d => getStroke(d)).attr('stroke-width', d => getStrokeWidth(d)); })
        .on('click', function(e, d) {
            if (e.shiftKey && selectedCountry) {
                compareCountry = d;
                renderComparePanel(selectedCountry, compareCountry);
            } else {
                selectedCountry = d;
                compareCountry = null;
                renderCountryPanel(d);
                highlightSelectedCountry(d);
            }
        });

        drawCountryLabels(features);
        drawCorridors();
        updateLegend();
    }

    function ensureCountryData(features) {
        features.forEach(d => {
            const name = d.properties?.name || '';
            const clean = getCleanName(name);
            if (!countryInfo[name] && !countryInfo[clean]) {
                const centroid = d3.geoCentroid(d);
                const area = d3.geoArea(d);
                const earthAreaKm2 = 510072000;
                const steradTotal = 4 * Math.PI;
                const areaKm2 = Math.round(area / steradTotal * earthAreaKm2);
                let capitalCoords = [0,0];
                if (centroid && !isNaN(centroid[0])) capitalCoords = [centroid[0], centroid[1]];
                const langName = lang === 'ar' ? 'غير معروف' : 'Unknown';
                countryInfo[name] = {
                    capital_ar: lang === 'ar' ? 'غير معروف' : 'Unknown',
                    capital_en: 'Unknown',
                    capital_coords: capitalCoords,
                    population_2026: Math.round(areaKm2 * 50 / 1000000 * 10) / 10,
                    area: areaKm2,
                    lang_ar: langName,
                    lang_en: 'Unknown'
                };
                if (!arabicNames[name] && !arabicNames[clean]) {
                    arabicNames[name] = name;
                }
            }
            if (!continentByCountry[name] && !continentByCountry[clean]) {
                continentByCountry[name] = getContinent(name);
            }
            if (!governmentByCountry[name] && !governmentByCountry[clean]) {
                governmentByCountry[name] = 'Unknown';
            }
        });
    }

    function renderCountryPanel(d) {
        const name = d.properties?.name || '';
        const displayName = lang === 'ar' ? getArabicName(name) : name;
        let info = countryInfo[name] || countryInfo[getCleanName(name)];
        let population = info ? info.population_2026 : null;
        let area = info ? info.area : null;
        let density = null;
        if (!info) {
            try {
                const areaSterad = d3.geoArea(d);
                const earthAreaKm2 = 510072000;
                const steradTotal = 4 * Math.PI;
                area = Math.round(areaSterad / steradTotal * earthAreaKm2);
                if (area > 0) {
                    density = getDensity(name);
                    population = Math.round(area * density / 1000000 * 10) / 10;
                }
            } catch(e) { area = null; population = null; }
        } else {
            density = getDensity(name);
        }

        let localTimeStr = t('unknown');
        if (info && info.capital_coords) {
            const baseOffset = Math.round(info.capital_coords[0] / 15);
            const observesDST = dstCountries.has(name);
            const isDST = observesDST && isDSTActive(name, baseOffset);
            const currentOffset = isDST ? baseOffset + 1 : baseOffset;
            const sign = currentOffset >= 0 ? '+' : '';
            const now = new Date();
            const utcHours = now.getUTCHours() + currentOffset;
            const localHours = ((utcHours % 24) + 24) % 24;
            const localMinutes = String(now.getUTCMinutes()).padStart(2, '0');
            localTimeStr = `${String(localHours).padStart(2, '0')}:${localMinutes} (UTC${sign}${currentOffset}`;
            if (observesDST) {
                const dstSign = (baseOffset + 1) >= 0 ? '+' : '';
                const baseSign = baseOffset >= 0 ? '+' : '';
                if (isDST) {
                    localTimeStr += ` ${t('dstActive')}، UTC${baseSign}${baseOffset} ${t('dstInactive')}`;
                } else {
                    localTimeStr += ` ${t('dstInactive')}، UTC${dstSign}${baseOffset + 1} ${t('dstActive')}`;
                }
            }
            localTimeStr += ')';
        }

        const continent = getContinent(name);
        const government = getGovernment(name);
        const continentLabel = lang === 'ar' ? (continentArabic[continent] || continent) : continent;
        const govLabel = lang === 'ar' ? (governmentArabic[government] || government) : government;

        let html = `<h3>${displayName}</h3>`;
        html += `<p><strong>${t('continent')}:</strong> ${continentLabel}</p>`;
        html += `<p><strong>${t('government')}:</strong> ${govLabel}</p>`;
        if (info || area) {
            const capital = info ? (lang === 'ar' ? info.capital_ar : info.capital_en) : (lang === 'ar' ? 'غير محدد' : 'N/A');
            const language = info ? (lang === 'ar' ? info.lang_ar : info.lang_en) : (lang === 'ar' ? 'غير محدد' : 'N/A');
            html += `<p><strong>${t('capital')}:</strong> ${capital}</p>`;
            html += `<p><strong>${t('areaTitle')}:</strong> ${area ? area.toLocaleString('en') : t('unknown')} ${t('km2')}</p>`;
            html += `<p><strong>${t('densityTitle')}:</strong> ${density !== null ? density + ' ' + t('densityUnit') : t('unknown')}</p>`;
            html += `<p><strong>${t('populationTitle')}:</strong> ${population ? '~' + population + ' ' + t('million') : t('unknown')}</p>`;
            html += `<p><strong>${t('languageTitle')}:</strong> ${language}</p>`;
            html += `<p><strong>🕒 ${t('localTime')}:</strong> ${localTimeStr}</p>`;
        } else {
            html += `<p>${t('unknown')}</p>`;
        }
        panelContent.innerHTML = html;
        countryPanel.style.display = 'block';
    }

    function renderComparePanel(d1, d2) {
        const name1 = d1.properties?.name || '';
        const name2 = d2.properties?.name || '';
        const displayName1 = lang === 'ar' ? getArabicName(name1) : name1;
        const displayName2 = lang === 'ar' ? getArabicName(name2) : name2;
        const info1 = countryInfo[name1] || countryInfo[getCleanName(name1)];
        const info2 = countryInfo[name2] || countryInfo[getCleanName(name2)];
        const area1 = info1 ? info1.area : null;
        const area2 = info2 ? info2.area : null;
        const dens1 = getDensity(name1);
        const dens2 = getDensity(name2);
        const pop1 = info1 ? info1.population_2026 : null;
        const pop2 = info2 ? info2.population_2026 : null;
        const rel1 = getReligion(name1);
        const rel2 = getReligion(name2);
        const relLabel1 = (lang === 'ar' && religionArabic[rel1]) ? religionArabic[rel1] : rel1;
        const relLabel2 = (lang === 'ar' && religionArabic[rel2]) ? religionArabic[rel2] : rel2;

        let html = `<h3>${t('compareTitle')} ${displayName1} ↔ ${displayName2}</h3>`;
        html += `<table style="width:100%;font-size:0.85em;text-align:center">`;
        html += `<tr><td></td><td><strong>${displayName1}</strong></td><td><strong>${displayName2}</strong></td></tr>`;
        html += `<tr><td>${t('areaTitle')}</td><td>${area1 ? area1.toLocaleString('en') : '?'}</td><td>${area2 ? area2.toLocaleString('en') : '?'}</td></tr>`;
        html += `<tr><td>${t('densityTitle')}</td><td>${dens1}</td><td>${dens2}</td></tr>`;
        html += `<tr><td>${t('populationTitle')}</td><td>${pop1 ? '~'+pop1 : '?'}</td><td>${pop2 ? '~'+pop2 : '?'}</td></tr>`;
        html += `<tr><td>${t('tooltipReligion')}</td><td>${relLabel1}</td><td>${relLabel2}</td></tr>`;
        html += `</table><br><button class="btn" id="closeCompareBtn">${t('closeCompare')}</button>`;
        panelContent.innerHTML = html;
        countryPanel.style.display = 'block';
        document.getElementById('closeCompareBtn')?.addEventListener('click', () => {
            compareCountry = null;
            if (selectedCountry) renderCountryPanel(selectedCountry);
        });
    }

    function exportCountryData() {
        if (!selectedCountry) return;
        const name = selectedCountry.properties?.name || '';
        const info = countryInfo[name] || countryInfo[getCleanName(name)];
        let text = `Country: ${name}\n`;
        if (info) {
            text += `Capital: ${info.capital_en}\n`;
            text += `Area: ${info.area} km²\n`;
            text += `Population (2026 est.): ${info.population_2026} million\n`;
            text += `Language: ${info.lang_en}\n`;
            text += `Density: ${getDensity(name)} people/km²\n`;
        }
        const blob = new Blob([text], {type:'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${t('exportFilename')}_${name.replace(/\s/g,'_')}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function copyCurrentLink() {
        const url = window.location.href.split('#')[0] + window.location.hash;
        navigator.clipboard.writeText(url).then(() => {
            copyNotification.textContent = t('copySuccess');
            copyNotification.classList.add('show');
            setTimeout(() => copyNotification.classList.remove('show'), 2000);
        }).catch(() => {
            copyNotification.textContent = t('copyFail');
            copyNotification.classList.add('show');
            setTimeout(() => copyNotification.classList.remove('show'), 2000);
        });
    }

    function updateAllStyles() {
        if (!countryPaths) return;
        countryPaths.transition().duration(400)
            .attr('fill', d => getCountryFill(d))
            .attr('stroke', d => getStroke(d))
            .attr('stroke-width', d => getStrokeWidth(d))
            .attr('opacity', d => getOpacity(d));
        if (countryLabelSelection) {
            countryLabelSelection.remove();
            countryLabelSelection = null;
        }
        drawCountryLabels(allCountryFeatures);
        drawPhysicalFeatures();
        drawCorridors();
        drawDensitySpots();
        drawCapitals();
        drawTimezones();
        updateLegend();
        if (selectedCountry && countryPanel.style.display === 'block' && !compareCountry) renderCountryPanel(selectedCountry);
        if (selectedCountry) highlightSelectedCountry(selectedCountry);
        updateHash();
    }

    function highlightSelectedCountry(d) {
        countryPaths.attr('stroke', d => getStroke(d)).attr('stroke-width', d => getStrokeWidth(d)).style('filter', 'none');
        if (d) {
            countryPaths.filter(p => p === d)
                .attr('stroke', '#ffd700')
                .attr('stroke-width', 2)
                .style('filter', 'drop-shadow(0 0 4px rgba(255,215,0,0.6))');
        }
    }

    function updateLegend() {
        let html = '';
        if (colorMode === 'terrain') {
            html += `<div style="font-weight:700">${t('terrainLegend')}</div>`;
            const unit = t('elevationUnit');
            [{l:`<0${unit}`,c:getTerrainColor(-1)},{l:`0-200`,c:getTerrainColor(100)},{l:`200-700`,c:getTerrainColor(500)},{l:`700-2000`,c:getTerrainColor(1500)},{l:`>3000`,c:getTerrainColor(3500)}].forEach(r => html += `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`);
        } else if (colorMode === 'density') {
            html += `<div style="font-weight:700">${t('densityLegend')}</div>`;
            [{l:'<10',c:getDensityColor(5)},{l:'10-100',c:getDensityColor(50)},{l:'100-500',c:getDensityColor(300)},{l:'>500',c:getDensityColor(800)}].forEach(r => html += `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`);
        } else if (colorMode === 'precipitation') {
            html += `<div style="font-weight:700">${t('precipitationLegend')}</div>`;
            [{l:'<100',c:getPrecipitationColor(50)},{l:'100-600',c:getPrecipitationColor(300)},{l:'600-1500',c:getPrecipitationColor(1000)},{l:'1500-3000',c:getPrecipitationColor(2000)},{l:'>3000',c:getPrecipitationColor(3500)}].forEach(r => html += `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`);
        } else if (colorMode === 'temperature') {
            html += `<div style="font-weight:700">${t('temperatureLegend')}</div>`;
            [{l:'<0°C',c:getTempColor(-5)},{l:'0-10°C',c:getTempColor(5)},{l:'10-20°C',c:getTempColor(15)},{l:'20-30°C',c:getTempColor(25)},{l:'>30°C',c:getTempColor(35)}].forEach(r => html += `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`);
        } else if (colorMode === 'normal') {
            html += `<div>${t('normalLegend')}</div>`;
        } else {
            html += `<div>${t('religionLegend')}</div>`;
            Object.entries(sectMode ? denominationColors : religionColors).forEach(([k,v]) => {
                const label = sectMode ? ((lang === 'ar' && denominationArabic[k]) ? denominationArabic[k] : k) : ((lang === 'ar' && religionArabic[k]) ? religionArabic[k] : k);
                html += `<div class="legend-item"><span class="legend-color" style="background:${v}"></span>${label}</div>`;
            });
        }
        if (corridorsVisible) html += `<div>${t('corridorsOn')}</div>`;
        if (densitySpotsMode && colorMode === 'density') html += `<div>${t('spotsOn')}</div>`;
        if (capitalsVisible) html += `<div>${t('capitalsOn')}</div>`;
        if (timezonesVisible) html += `<div>${t('timezonesOn')}</div>`;
        legendEl.innerHTML = html;
    }

    function setMode(mode) { colorMode = mode; modeButtons.forEach(b => b.classList.remove('active')); document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active'); updateAllStyles(); }
    function toggleSect() { sectMode = !sectMode; sectToggle.classList.toggle('toggle-on', sectMode); if (sectMode && colorMode !== 'religion') setMode('religion'); else updateAllStyles(); }
    function toggleCorridors() { corridorsVisible = !corridorsVisible; corridorsToggle.classList.toggle('toggle-on', corridorsVisible); drawCorridors(); updateLegend(); }
    function toggleDensitySpots() {
        densitySpotsMode = !densitySpotsMode;
        densitySpotsToggle.classList.toggle('toggle-on', densitySpotsMode);
        if (densitySpotsMode && colorMode !== 'density') {
            setMode('density');
        } else {
            drawDensitySpots();
            updateLegend();
        }
    }
    function toggleCapitals() { capitalsVisible = !capitalsVisible; capitalsToggle.classList.toggle('toggle-on', capitalsVisible); drawCapitals(); updateLegend(); }
    function toggleTimezones() { timezonesVisible = !timezonesVisible; timezonesToggle.classList.toggle('toggle-on', timezonesVisible); drawTimezones(); updateLegend(); }
    function setLanguage(l) { lang = l; applyLanguage(); }

    function applyLanguage() {
        document.getElementById('rowLangLabel').textContent = t('rowLangLabel');
        document.getElementById('rowModeLabel').textContent = t('rowModeLabel');
        document.getElementById('rowFilterLabel').textContent = t('rowFilterLabel');
        document.getElementById('rowKeysLabel').textContent = t('rowKeysLabel');

        document.querySelectorAll('[id$="Label"]').forEach(el => {
            if (el.id === 'langLabel') el.textContent = t('langLabel');
            else if (el.id === 'modeLabel') el.textContent = t('modeLabel');
            else if (el.id === 'filterLabel') el.textContent = t('filterLabel');
        });
        langToggle.textContent = lang === 'ar' ? 'English' : 'العربية';
        sectToggle.textContent = t('sectToggle');
        corridorsToggle.textContent = t('corridorsToggle');
        densitySpotsToggle.textContent = t('densitySpotsToggle');
        capitalsToggle.textContent = t('capitalsToggle');
        timezonesToggle.textContent = t('timezonesToggle');
        copyLinkBtn.title = t('copyLinkBtn');
        resetBtn.textContent = t('resetBtn');
        modeButtons.forEach(b => b.textContent = t(`mode_${b.dataset.mode}`));
        religionButtons.forEach(b => b.textContent = t(`religion_${b.dataset.religion}`));
        zoomInBtn.title = t('zoomIn');
        zoomOutBtn.title = t('zoomOut');
        zoomResetBtn.title = t('zoomReset');
        searchInput.placeholder = t('searchPlaceholder');
        exportBtn.title = t('exportLabel');
        updateInfoOverlay();
        if (allCountryFeatures.length) {
            if (countryLabelSelection) {
                countryLabelSelection.remove();
                countryLabelSelection = null;
            }
            drawCountryLabels(allCountryFeatures);
        }
        updateAllStyles();
    }
    function updateInfoOverlay() { infoOverlay.textContent = t('infoOverlay', {zoom: currentTransform.k.toFixed(1)}); }

    function resetZoom() { svg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity); }

    function setupSearch() {
        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            suggestionsList.innerHTML = '';
            if (!val) { suggestionsList.style.display = 'none'; return; }
            const matches = countryNamesList.filter(n => {
                const ar = getArabicName(n).toLowerCase();
                return n.toLowerCase().includes(val) || ar.includes(val);
            }).slice(0, 8);
            if (matches.length) {
                matches.forEach(m => {
                    const li = document.createElement('li');
                    li.textContent = lang === 'ar' ? getArabicName(m) : m;
                    li.addEventListener('click', () => {
                        searchInput.value = '';
                        suggestionsList.style.display = 'none';
                        flyToCountry(m);
                    });
                    suggestionsList.appendChild(li);
                });
                suggestionsList.style.display = 'block';
            } else {
                suggestionsList.style.display = 'none';
            }
        });
        searchInput.addEventListener('blur', () => setTimeout(() => suggestionsList.style.display = 'none', 200));
    }

    function flyToCountry(name) {
        const feature = allCountryFeatures.find(f => f.properties?.name === name);
        if (!feature) return;
        const centroid = d3.geoCentroid(feature);
        if (!centroid || isNaN(centroid[0])) return;
        const {width, height} = getContainerDimensions();
        const [px, py] = projection(centroid);
        const targetX = width/2 - px * 3;
        const targetY = height/2 - py * 3;
        const transform = d3.zoomIdentity.translate(targetX, targetY).scale(3);
        svg.transition().duration(800).call(zoomBehavior.transform, transform)
            .on('end', () => {
                highlightCountry(feature);
            });
    }

    function highlightCountry(feature) {
        if (!feature || !countryPaths) return;
        countryPaths.classed('highlighted-country', false);
        const path = countryPaths.filter(d => d === feature);
        path.classed('highlighted-country', true);
        if (highlightTimeout) clearTimeout(highlightTimeout);
        highlightTimeout = setTimeout(() => {
            countryPaths.classed('highlighted-country', false);
        }, 3000);
    }

    function updateHash() {
        const hash = new URLSearchParams();
        hash.set('lang', lang); hash.set('mode', colorMode); hash.set('filter', currentReligionFilter);
        hash.set('sect', sectMode ? '1' : '0'); hash.set('corridors', corridorsVisible ? '1' : '0');
        hash.set('spots', densitySpotsMode ? '1' : '0'); hash.set('capitals', capitalsVisible ? '1' : '0');
        hash.set('timezones', timezonesVisible ? '1' : '0');
        hash.set('k', currentTransform.k.toFixed(2)); hash.set('x', currentTransform.x.toFixed(0)); hash.set('y', currentTransform.y.toFixed(0));
        window.location.hash = hash.toString();
    }

    function loadFromHash() {
        try {
            const hash = new URLSearchParams(window.location.hash.substring(1));
            if (hash.has('lang')) setLanguage(hash.get('lang'));
            if (hash.has('mode')) setMode(hash.get('mode'));
            if (hash.has('filter')) { currentReligionFilter = hash.get('filter'); religionButtons.forEach(b => b.classList.remove('active')); const btn = document.querySelector(`.religion-btn[data-religion="${currentReligionFilter}"]`); if (btn) btn.classList.add('active'); }
            if (hash.get('sect') === '1' && !sectMode) toggleSect();
            if (hash.get('corridors') === '1' && !corridorsVisible) toggleCorridors();
            if (hash.get('spots') === '1' && !densitySpotsMode) toggleDensitySpots();
            if (hash.get('capitals') === '1' && !capitalsVisible) toggleCapitals();
            if (hash.get('timezones') === '1' && !timezonesVisible) toggleTimezones();
            if (hash.has('k') && hash.has('x') && hash.has('y')) {
                const k = +hash.get('k'), x = +hash.get('x'), y = +hash.get('y');
                if (!isNaN(k) && !isNaN(x) && !isNaN(y)) svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(x, y).scale(k));
            }
        } catch(e) {}
    }

    function setupKeyboard() {
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            const code = e.code;
            if (code === 'KeyR') setMode('religion');
            else if (code === 'KeyT') setMode('terrain');
            else if (code === 'KeyD') setMode('density');
            else if (code === 'KeyP') setMode('precipitation');
            else if (code === 'KeyH') setMode('temperature');
            else if (code === 'KeyN') setMode('normal');
            else if (code === 'KeyA') toggleCapitals();
            else if (code === 'KeyZ') toggleTimezones();
            else if (code === 'Digit1') { currentReligionFilter = 'all'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'Digit2') { currentReligionFilter = 'muslim'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'Digit3') { currentReligionFilter = 'christian'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'Digit4') { currentReligionFilter = 'hindu'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'Digit5') { currentReligionFilter = 'buddhist'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'Digit6') { currentReligionFilter = 'jewish'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'Digit7') { currentReligionFilter = 'other'; updateReligionButtons(); updateAllStyles(); }
            else if (code === 'KeyS' && e.ctrlKey) { e.preventDefault(); toggleSect(); }
            else if (code === 'KeyC' && e.ctrlKey) { e.preventDefault(); toggleCorridors(); }
            else if (code === 'KeyB' && e.ctrlKey) { e.preventDefault(); toggleDensitySpots(); }
            else if (code === 'Escape') { resetBtn.click(); }
            else if (code === 'Equal' || code === 'NumpadAdd') { svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.35); }
            else if (code === 'Minus' || code === 'NumpadSubtract') { svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.74); }
        });
    }

    function updateReligionButtons() {
        religionButtons.forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`.religion-btn[data-religion="${currentReligionFilter}"]`);
        if (btn) btn.classList.add('active');
    }

    function updateCoordinates(event) {
        const rect = mapContainer.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const coords = projection.invert([x, y]);
        if (coords && !isNaN(coords[0]) && !isNaN(coords[1])) {
            const lon = coords[0].toFixed(2);
            const lat = coords[1].toFixed(2);
            coordinatesDisplay.textContent = t('coordinates', {lon, lat});
        }
    }

    function drawPhysicalFeatures() {
        gPhysical.selectAll('*').remove();
        if (colorMode !== 'terrain') return;
        mountainRanges.forEach(m => {
            gPhysical.append('path').datum({type:'LineString', coordinates: m.coords}).attr('d', pathGen)
                .attr('fill','none').attr('stroke','#d2b48c').attr('stroke-width',2.5).attr('vector-effect','non-scaling-stroke').attr('opacity',0.9)
                .on('mouseenter',()=>{tooltip.innerHTML=`<strong>${m.name}</strong><br>${t('mountain')}`;tooltip.classList.add('visible');})
                .on('mousemove',e=>{const r=mapContainer.getBoundingClientRect();tooltip.style.left=(e.clientX-r.left+16)+'px';tooltip.style.top=(e.clientY-r.top-50)+'px';})
                .on('mouseleave',()=>tooltip.classList.remove('visible'));
        });
        rivers.forEach(r => {
            gPhysical.append('path').datum({type:'LineString', coordinates: r.coords}).attr('d', pathGen)
                .attr('fill','none').attr('stroke','#4fc3f7').attr('stroke-width',1.8).attr('vector-effect','non-scaling-stroke').attr('opacity',0.85)
                .on('mouseenter',()=>{tooltip.innerHTML=`<strong>${r.name}</strong><br>${t('river')}`;tooltip.classList.add('visible');})
                .on('mousemove',e=>{const r=mapContainer.getBoundingClientRect();tooltip.style.left=(e.clientX-r.left+16)+'px';tooltip.style.top=(e.clientY-r.top-50)+'px';})
                .on('mouseleave',()=>tooltip.classList.remove('visible'));
        });
    }

    function drawDensitySpots() {
        gTemperature.selectAll('*').remove();
        if (colorMode !== 'density' || !densitySpotsMode) return;
        densitySpots.forEach(s => {
            const [x, y] = projection(s.coords);
            if (isNaN(x) || isNaN(y)) return;
            const baseR = Math.max(1.5, Math.sqrt(s.density)/30);
            const color = getSpotColor(s.density);
            gTemperature.append('circle').attr('cx',x).attr('cy',y).attr('r',baseR*3.5).attr('fill',color).attr('opacity',0.15);
            gTemperature.append('circle').attr('cx',x).attr('cy',y).attr('r',baseR*2.2).attr('fill',color).attr('opacity',0.4);
            gTemperature.append('circle').attr('cx',x).attr('cy',y).attr('r',baseR).attr('fill',color).attr('opacity',0.95).attr('stroke','#fff').attr('stroke-width',0.8);
            gTemperature.append('text').attr('x',x+baseR+2).attr('y',y-2).text(s.name).attr('fill','#fff').attr('font-size',7).attr('font-weight','bold');
        });
    }

    function drawTimezones() {
        gTimezones.selectAll('*').remove();
        if (!timezonesVisible) return;
        timezones.forEach(tz => {
            const path = gTimezones.append('path')
                .datum({type:'Polygon', coordinates: [tz.coords]})
                .attr('d', pathGen)
                .attr('fill', 'none')
                .attr('stroke', 'rgba(255,255,255,0.2)')
                .attr('stroke-width', 0.8)
                .attr('stroke-dasharray', '4,4')
                .attr('vector-effect', 'non-scaling-stroke');
            path.on('mouseenter', () => {
                const sign = tz.offset >= 0 ? '+' : '';
                tooltip.innerHTML = `<strong>UTC${sign}${tz.offset}</strong><br>${t('timezone')}`;
                tooltip.classList.add('visible');
            })
            .on('mousemove', e => {
                const r = mapContainer.getBoundingClientRect();
                tooltip.style.left = (e.clientX - r.left + 16) + 'px';
                tooltip.style.top = (e.clientY - r.top - 50) + 'px';
            })
            .on('mouseleave', () => tooltip.classList.remove('visible'));
        });
    }

    function drawGraticule() {
        const g = d3.geoGraticule10(); gGraticule.selectAll('*').remove();
        gGraticule.append('path').datum(g).attr('fill','none').attr('stroke','rgba(255,255,255,0.08)').attr('stroke-width',0.4).attr('d', pathGen);
        gGraticule.append('path').datum({type:'Sphere'}).attr('fill','none').attr('stroke','rgba(255,255,255,0.15)').attr('stroke-width',1.2).attr('d', pathGen);
    }

    async function loadWorld() { const r = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'); const t = await r.json(); return topojson.feature(t, t.objects.countries).features; }

    async function init() {
        createSvg(); setupZoom(); drawGraticule(); setupSearch(); setupKeyboard();
        const features = await loadWorld();
        renderCountries(features);
        applyLanguage();
        loadFromHash();
        updateHash();
        mapContainer.addEventListener('mousemove', updateCoordinates);
    }

    // ========== ربط الأحداث ==========
    modeButtons.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
    sectToggle.addEventListener('click', toggleSect);
    corridorsToggle.addEventListener('click', toggleCorridors);
    densitySpotsToggle.addEventListener('click', toggleDensitySpots);
    capitalsToggle.addEventListener('click', toggleCapitals);
    timezonesToggle.addEventListener('click', toggleTimezones);
    copyLinkBtn.addEventListener('click', copyCurrentLink);

    const menuToggle = document.getElementById('menuToggle');
    if (menuToggle) {
        menuToggle.addEventListener('click', function() {
            const bar = document.getElementById('controlsBar');
            bar.classList.toggle('active');
            this.classList.toggle('active');
        });
    }

    langToggle.addEventListener('click', () => setLanguage(lang === 'ar' ? 'en' : 'ar'));

    religionButtons.forEach(b => b.addEventListener('click', () => {
        currentReligionFilter = b.dataset.religion;
        religionButtons.forEach(bb => bb.classList.remove('active'));
        b.classList.add('active');
        updateAllStyles();
    }));

    zoomInBtn.addEventListener('click', () => { svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.35); });
    zoomOutBtn.addEventListener('click', () => { svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.74); });
    zoomResetBtn.addEventListener('click', resetZoom);

    closePanelBtn.addEventListener('click', () => {
        countryPanel.style.display = 'none';
        selectedCountry = null;
        compareCountry = null;
        highlightSelectedCountry(null);
    });
    exportBtn.addEventListener('click', exportCountryData);

    resetBtn.addEventListener('click', () => {
        currentReligionFilter = 'all';
        religionButtons.forEach(b => b.classList.remove('active'));
        document.querySelector('.religion-btn[data-religion="all"]').classList.add('active');
        setMode('religion');
        if (sectMode) toggleSect();
        if (corridorsVisible) toggleCorridors();
        if (densitySpotsMode) toggleDensitySpots();
        if (capitalsVisible) toggleCapitals();
        if (timezonesVisible) toggleTimezones();
        resetZoom();
        selectedCountry = null;
        compareCountry = null;
        highlightSelectedCountry(null);
    });

    window.addEventListener('resize', () => {
        const {width, height} = getContainerDimensions();
        svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
        svgEl.setAttribute('width', width);
        svgEl.setAttribute('height', height);
        projection = setupProjection(width, height);
        pathGen = d3.geoPath(projection);
        gOcean.select('rect').attr('width', width + 1000).attr('height', height + 1000);
        drawGraticule();
        if (allCountryFeatures.length) {
            gCountries.selectAll('path').attr('d', pathGen);
            if (countryLabelSelection) {
                countryLabelSelection.remove();
                countryLabelSelection = null;
            }
            drawCountryLabels(allCountryFeatures);
        }
        drawPhysicalFeatures();
        drawCorridors();
        drawDensitySpots();
        drawCapitals();
        drawTimezones();
        svg.call(zoomBehavior.transform, currentTransform);
    });

    if ('serviceWorker' in navigator) {
        const basePath = window.location.pathname.replace(/\/[^\/]*$/, '/');
        navigator.serviceWorker.register(basePath + 'sw.js', { scope: basePath })
            .then(reg => console.log('✅ Service Worker مسجل بنجاح:', reg))
            .catch(err => console.error('❌ فشل تسجيل Service Worker:', err));
    }

    init().then(() => console.log('🦋 جميع التحسينات مطبقة بنجاح!'));
})();
</script>
</body>
</html>
