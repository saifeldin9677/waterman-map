<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خريطة Waterman Butterfly متعددة الطبقات</title>
    <script src="https://d3js.org/d3.v7.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4/dist/d3-geo-projection.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3">
    </script>

    <style>
        /* جميع الأنماط كما هي مع تحسينات إضافية للهواتف */
        :root {
            --bg: #1a1d23;
            --panel-bg: #21252b;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border: #333842;
            --btn-bg: #2a2d35;
            --btn-hover: #353a45;
            --btn-active: #3a4458;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            --transition: 0.3s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            user-select: none;
        }
        .header {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            padding-top: calc(8px + env(safe-area-inset-top, 10px));
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: var(--shadow);
            gap: 6px;
            flex-wrap: nowrap;
        }
        .header .title-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 1;
            min-width: 0;
        }
        .header .logo-icon {
            font-size: 20px;
        }
        .header h1 {
            font-size: 0.9em;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e0e0, #b0c4de);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .header .subtitle {
            display: none;
        }
        .map-container {
            flex: 1;
            position: relative;
            cursor: grab;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a2840 0%, #0d1520 100%);
        }
        .map-container:active {
            cursor: grabbing;
        }
        .map-container svg {
            display: block;
            width: 100%;
            height: 100%;
        }
        .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(20, 24, 32, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 6px 10px;
            color: #fff;
            font-size: 0.7em;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 200px;
            text-align: center;
            line-height: 1.5;
        }
        .tooltip.visible {
            opacity: 1;
        }
        .legend {
            position: fixed;
            bottom: 80px;
            left: 16px;
            background: rgba(20, 24, 32, 0.9);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            z-index: 999;
            font-size: 0.7em;
            display: flex;
            flex-direction: column;
            gap: 4px;
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            max-height: 50vh;
            overflow-y: auto;
            transition: opacity 0.3s ease;
        }
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .info-overlay {
            display: none;
        }
        .zoom-controls {
            position: fixed;
            bottom: 160px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 999;
            transition: opacity 0.3s ease;
        }
        .zoom-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(20, 24, 32, 0.9);
            color: #fff;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
        }
        .zoom-btn:hover {
            background: rgba(40, 46, 58, 0.95);
            transform: scale(1.08);
        }
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box input {
            width: 80px;
            padding: 3px 8px;
            border-radius: 14px;
            background: var(--btn-bg);
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 0.6em;
            outline: none;
            font-family: inherit;
        }
        .suggestions-list {
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 50;
            list-style: none;
            display: none;
            width: 150px;
            font-size: 0.6em;
        }
        .suggestions-list li {
            padding: 4px 8px;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .suggestions-list li:hover {
            background: var(--btn-hover);
        }
        .suggestions-list .flag-icon {
            font-size: 1.2em;
            line-height: 1;
        }
        .country-panel {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 24, 32, 0.95);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            z-index: 30;
            color: #fff;
            font-size: 0.7em;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            display: none;
            text-align: center;
            max-width: 320px;
            min-width: 200px;
        }
        .country-panel .close-btn,
        .country-panel .export-btn {
            font-size: 0.9em;
            padding: 0 4px;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
        }
        .country-panel .close-btn {
            float: left;
        }
        .country-panel .export-btn {
            float: right;
        }
        .country-panel table {
            border-collapse: collapse;
            margin: 6px auto;
        }
        .country-panel table td,
        .country-panel table th {
            padding: 4px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .compare-bar {
            display: inline-block;
            height: 8px;
            border-radius: 4px;
            background: #ffd700;
            margin: 0 2px;
        }
        .coordinates-display {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(6px);
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 0.6em;
            color: var(--text-secondary);
            z-index: 1000;
            white-space: nowrap;
            font-family: monospace;
            letter-spacing: 0.3px;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .coordinates-display.hidden {
            opacity: 0;
        }
        .copy-notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 125, 50, 0.9);
            color: #fff;
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 0.7em;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .copy-notification.show {
            opacity: 1;
        }
        .menu-toggle {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            color: var(--text);
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .menu-toggle:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
        }
        .menu-toggle.active {
            background: var(--btn-active);
            border-color: #fff;
        }
        .controls-bar {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            max-width: 92vw;
            background: rgba(20, 24, 32, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 16px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            max-height: 60vh;
            overflow-y: auto;
        }
        .controls-bar.active {
            display: flex;
        }
        .controls-bar .row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .controls-bar .row-label {
            font-size: 0.6em;
            color: var(--text-secondary);
            font-weight: 600;
            margin-left: 4px;
            white-space: nowrap;
        }
        .controls-bar .btn {
            padding: 6px 10px;
            font-size: 0.7em;
            border-radius: 20px;
            min-height: 32px;
        }
        .controls-bar .control-group {
            gap: 4px;
        }
        .controls-bar .search-box input {
            width: 100px;
            padding: 4px 10px;
            font-size: 0.7em;
        }
        .controls-bar .control-label,
        .controls-bar .divider {
            display: none;
        }
        .country-label {
            font-weight: 600;
            fill: #e0e0e0;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8), 0 0 8px rgba(0, 0, 0, 0.6);
        }
        .capital-label {
            font-size: 6px;
            fill: #fff;
            text-anchor: start;
            dominant-baseline: central;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
            font-weight: 500;
        }
        .corridor-dot {
            fill: #ff9100;
            stroke: #fff;
            stroke-width: 0.5;
            vector-effect: non-scaling-stroke;
        }
        .capital-dot {
            fill: #ffd700;
            stroke: #000;
            stroke-width: 0.5;
            vector-effect: non-scaling-stroke;
        }
        .capital-halo {
            fill: #ffd700;
            opacity: 0.25;
            vector-effect: non-scaling-stroke;
        }
        .highlighted-country {
            filter: drop-shadow(0 0 8px #ffd700);
            stroke: #ffd700 !important;
            stroke-width: 2 !important;
        }
        .corridor-line {
            fill: none;
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
        }
        .corridor-glow {
            fill: none;
            stroke-linecap: round;
            vector-effect: non-scaling-stroke;
            filter: drop-shadow(0 0 6px currentColor);
        }
        #mapSvg {
            will-change: transform;
        }
        .map-transform-group {
            will-change: transform;
        }
        .major-city-dot {
            fill: #ff4081;
            stroke: #fff;
            stroke-width: 0.8;
            vector-effect: non-scaling-stroke;
            cursor: default;
        }
        .major-city-label {
            font-size: 5px;
            fill: #fff;
            text-anchor: start;
            dominant-baseline: central;
            pointer-events: none;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
            font-weight: 400;
        }
        /* تحسينات الهواتف: تقليل حجم الأزرار والنقاط */
        @media (max-width: 768px) {
            .controls-bar {
                width: 95vw;
                max-width: 95vw;
                bottom: 80px;
                padding: 12px 10px;
                max-height: 70vh;
                border-radius: 20px;
            }
            .controls-bar .row {
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
            }
            .controls-bar .btn {
                font-size: 0.65em;
                padding: 6px 8px;
                min-height: 30px;
                border-radius: 16px;
                flex: 0 1 auto;
            }
            .controls-bar .row-label {
                display: none;
            }
            .controls-bar .search-box input {
                width: 70px;
                font-size: 0.65em;
                padding: 4px 8px;
            }
            .menu-toggle {
                width: 48px;
                height: 48px;
                font-size: 1.6em;
                bottom: 16px;
                right: 12px;
            }
            .zoom-btn {
                width: 28px;
                height: 28px;
                font-size: 1em;
            }
            .zoom-controls {
                bottom: 150px;
                right: 12px;
                gap: 4px;
            }
            .coordinates-display {
                font-size: 0.45em;
                padding: 3px 10px;
                bottom: 4px;
                white-space: nowrap;
                max-width: 90vw;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .legend {
                bottom: 70px;
                left: 10px;
                font-size: 0.55em;
                padding: 8px 10px;
                max-height: 40vh;
            }
            .legend-color {
                width: 8px;
                height: 8px;
            }
            .country-panel {
                font-size: 0.6em;
                max-width: 280px;
                min-width: 160px;
                padding: 8px 12px;
                top: 20px;
            }
            .tooltip {
                font-size: 0.6em;
                max-width: 160px;
                padding: 4px 8px;
            }
            .capital-label {
                font-size: 5px !important;
            }
            .major-city-label {
                font-size: 4px !important;
            }
            /* تقليل حجم النقاط للهواتف يتم عبر JS */
        }
        @media (min-width: 1024px) {
            .menu-toggle {
                display: none !important;
            }
            .controls-bar {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: auto !important;
                transform: none !important;
                width: 100% !important;
                max-width: 100% !important;
                background: rgba(20, 24, 32, 0.92) !important;
                backdrop-filter: blur(8px) !important;
                border-radius: 0 !important;
                padding: 6px 16px !important;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3) !important;
                border: none !important;
                border-bottom: 1px solid var(--border) !important;
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                align-items: center !important;
                gap: 6px 16px !important;
                max-height: none !important;
                overflow-y: visible !important;
                z-index: 20 !important;
                margin: 0 !important;
                backdrop-filter: blur(8px);
            }
            .controls-bar .row {
                flex-wrap: nowrap !important;
                gap: 6px 12px !important;
            }
            .controls-bar .row-label {
                display: inline-block !important;
                font-size: 0.7em !important;
                color: var(--text-secondary) !important;
                margin-left: 4px;
            }
            .controls-bar .btn {
                font-size: 0.7em !important;
                padding: 4px 10px !important;
                min-height: 28px !important;
                border-radius: 16px !important;
            }
            .controls-bar .search-box input {
                width: 120px !important;
                font-size: 0.7em !important;
                padding: 4px 8px !important;
            }
            .controls-bar .control-label,
            .controls-bar .divider {
                display: none !important;
            }
            .zoom-controls {
                bottom: 40px !important;
                right: 30px !important;
                gap: 10px !important;
            }
            .zoom-btn {
                width: 44px !important;
                height: 44px !important;
                font-size: 1.6em !important;
                border-radius: 12px !important;
                background: rgba(20, 24, 32, 0.85) !important;
                backdrop-filter: blur(4px) !important;
                border: 1px solid rgba(255, 255, 255, 0.15) !important;
            }
            .zoom-btn:hover {
                background: rgba(50, 56, 70, 0.95) !important;
                transform: scale(1.08) !important;
            }
            .legend {
                bottom: 40px !important;
                left: 30px !important;
                font-size: 0.85em !important;
                padding: 14px 20px !important;
                border-radius: 14px !important;
                min-width: 160px !important;
                background: rgba(20, 24, 32, 0.92) !important;
                backdrop-filter: blur(6px) !important;
            }
            .legend-color {
                width: 14px !important;
                height: 14px !important;
                border-radius: 4px !important;
            }
            .legend-item {
                gap: 8px !important;
                padding: 2px 0 !important;
            }
            .header {
                padding: 6px 20px !important;
            }
            .header h1 {
                font-size: 1.1em !important;
            }
            .country-panel {
                font-size: 0.9em !important;
                max-width: 360px !important;
                padding: 16px 20px !important;
                top: 80px !important;
            }
            .tooltip {
                font-size: 0.85em !important;
                padding: 8px 14px !important;
                max-width: 260px !important;
            }
            .capital-label {
                font-size: 8px !important;
            }
            .major-city-label {
                font-size: 7px !important;
            }
            .coordinates-display {
                font-size: 0.7em !important;
                padding: 6px 20px !important;
                bottom: 16px !important;
            }
        }
        @media (min-width: 769px) and (max-width: 1023px) {
            .zoom-btn {
                width: 36px;
                height: 36px;
                font-size: 1.2em;
            }
            .legend {
                font-size: 0.75em;
                padding: 10px 14px;
            }
        }
        .btn {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--btn-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.6em;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
            outline: none;
            position: relative;
        }
        .btn:hover {
            background: var(--btn-hover);
            border-color: #555;
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
        }
        .btn.active {
            box-shadow: 0 0 0 2px rgba(77, 166, 255, 0.35);
            background: var(--btn-active);
            font-weight: 700;
            color: #fff;
        }
        .mode-btn.active {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25);
            background: #3a4050;
        }
        .toggle-on {
            background: #2a3a40;
            border-color: #4a7a6a;
            color: #c0e0d0;
        }
        .divider {
            width: 1px;
            height: 16px;
            background: var(--border);
            margin: 0 2px;
            border-radius: 1px;
            flex-shrink: 0;
        }
        .btn[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7em;
            white-space: nowrap;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-group">
            <span class="logo-icon">🦋</span>
            <div><h1>خريطة Waterman Butterfly</h1><span class="subtitle" style="font-size:0.7em;color:var(--text-secondary);">Interactive Multilayer Map</span></div>
        </div>
        <span style="font-size:0.7em;color:var(--text-secondary);">إسقاط ووترمان الفراشي</span>
    </div>

    <div class="map-container" id="mapContainer">
        <svg id="mapSvg"></svg>
        <div class="tooltip" id="tooltip"></div>
        <div class="legend" id="legend"></div>
        <div class="info-overlay" id="infoOverlay"></div>

        <div class="coordinates-display" id="coordinatesDisplay">
            خط الطول: — &nbsp;|&nbsp; خط العرض: — &nbsp;|&nbsp; تكبير: 1.0x &nbsp;|&nbsp; الوضع: دين &nbsp;|&nbsp; الفلتر: الكل
        </div>

        <div class="country-panel" id="countryPanel">
            <button class="export-btn" id="exportBtn" title="تحميل معلومات الدولة">💾</button>
            <button class="close-btn" id="closePanelBtn" title="إغلاق">✖</button>
            <div id="panelContent"></div>
        </div>

        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomInBtn" title="تكبير">+</button>
            <button class="zoom-btn" id="zoomOutBtn" title="تصغير">−</button>
            <button class="zoom-btn" id="zoomResetBtn" title="إعادة تعيين التكبير">⌂</button>
        </div>

        <button class="menu-toggle" id="menuToggle" title="فتح القائمة">☰</button>

        <div class="controls-bar" id="controlsBar">
            <div class="row">
                <span class="row-label" id="rowLangLabel">🌐 اللغة:</span>
                <button class="btn" id="langToggle" title="تبديل اللغة">English</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="بحث..." autocomplete="off" title="ابحث عن دولة">
                    <ul class="suggestions-list" id="suggestionsList"></ul>
                </div>
                <button class="btn" id="copyLinkBtn" title="نسخ الرابط مع الحالة الحالية">📋</button>
                <button class="btn" id="shareBtn" title="مشاركة الخريطة">📤</button>
                <button class="btn" id="resetBtn" title="إعادة تعيين كل شيء (الوضع، الفلاتر، التكبير)">↺ إعادة</button>

            function t(key, params = {}) {
                let s = i18n[lang]?.[key] || i18n.en[key] || key;
                for (let [k, v] of Object.entries(params)) s = s.replace(`{${k}}`, v);
                return s;
            }

            // ===== دوال مساعدة =====
            function getCleanName(rawName) {
                if (!rawName) return '';
                return rawName.replace(/^(Islamic Republic of|Republic of|State of|Kingdom of|Federal Republic of|Democratic Republic of|Commonwealth of|People's Republic of|United States of America|United Kingdom of Great Britain and Northern Ireland)\s+/i, '')
                    .replace(/\s*\(.*\)\s*/g, '').replace(/^Rep\.\s*/i, '').trim();
            }

            function getArabicName(enName) {
                if (!enName) return '';
                let clean = getCleanName(enName);
                if (arabicNames[clean]) return arabicNames[clean];
                if (arabicNames[enName]) return arabicNames[enName];
                for (let [k, v] of Object.entries(arabicNames))
                    if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase()))
                        return v;
                return enName;
            }

            function getReligion(name) {
                if (!name) return 'unknown';
                if (religionByCountry[name]) return religionByCountry[name];
                const clean = getCleanName(name);
                if (religionByCountry[clean]) return religionByCountry[clean];
                for (let [k, v] of Object.entries(religionByCountry))
                    if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase()))
                        return v;
                return 'unknown';
            }

            function getDenomination(name) {
                if (!name) return getReligion(name);
                if (denominationByCountry[name]) return denominationByCountry[name];
                const clean = getCleanName(name);
                if (denominationByCountry[clean]) return denominationByCountry[clean];
                for (let [k, v] of Object.entries(denominationByCountry))
                    if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase()))
                        return v;
                return getReligion(name);
            }

            function getElevation(name) {
                if (!name) return null;
                if (elevationByCountry[name] !== undefined) return elevationByCountry[name];
                const clean = getCleanName(name);
                if (elevationByCountry[clean] !== undefined) return elevationByCountry[clean];
                return Math.round(500 + Math.random() * 300);
            }

            function getDensity(name) {
                if (!name) return null;
                if (densityByCountry[name] !== undefined) return densityByCountry[name];
                const clean = getCleanName(name);
                if (densityByCountry[clean] !== undefined) return densityByCountry[clean];
                for (let [k, v] of Object.entries(densityByCountry))
                    if (clean.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(clean.toLowerCase()))
                        return v;
                return 50;
            }

            function getPrecipitation(name) {
                if (!name) return null;
                if (precipitationByCountry[name] !== undefined) return precipitationByCountry[name];
                const clean = getCleanName(name);
                if (precipitationByCountry[clean] !== undefined) return precipitationByCountry[clean];
                return 800;
            }

            function getTemperature(name, d) {
                if (!name) return null;
                if (tempByCountry[name] !== undefined) return tempByCountry[name];
                const clean = getCleanName(name);
                if (tempByCountry[clean] !== undefined) return tempByCountry[clean];
                if (d && d.geometry) {
                    const centroid = d3.geoCentroid(d);
                    if (centroid && !isNaN(centroid[1])) {
                        const lat = Math.abs(centroid[1]);
                        let est = 28 - lat * 0.8;
                        if (lat > 60) est = 28 - 60 * 0.8 - (lat - 60) * 1.2;
                        if (lat > 80) est = -20;
                        return Math.round(est);
                    }
                }
                return null;
            }

            function getTerrainColor(elev) {
                if (elev == null || isNaN(elev)) return '#5a5a60';
                if (elev < 0) return '#2d6a4f';
                if (elev < 50) return '#4c8c3a';
                if (elev < 200) return '#6ba33d';
                if (elev < 400) return '#8db840';
                if (elev < 700) return '#c4a840';
                if (elev < 1200) return '#c48440';
                if (elev < 2000) return '#a06030';
                if (elev < 3000) return '#7a4030';
                if (elev < 4000) return '#5a3035';
                return '#e8e0d8';
            }

            function getDensityColor(dens) {
                if (dens == null || isNaN(dens)) return '#5a5a60';
                if (dens < 1) return '#f5f0e6';
                if (dens < 10) return '#e0d8c0';
                if (dens < 50) return '#c8b880';
                if (dens < 100) return '#b09860';
                if (dens < 200) return '#a07840';
                if (dens < 500) return '#c04030';
                if (dens < 1000) return '#b02020';
                return '#7a1020';
            }

            function getPrecipitationColor(prec) {
                if (prec == null || isNaN(prec)) return '#5a5a60';
                if (prec < 100) return '#d4a85c';
                if (prec < 300) return '#e0c070';
                if (prec < 600) return '#a8d08d';
                if (prec < 1000) return '#6ab04c';
                if (prec < 1500) return '#4a9c3f';
                if (prec < 2000) return '#3b8cc7';
                if (prec < 3000) return '#2c5f8a';
                return '#1a3d5c';
            }

            function getTempColor(temp) {
                if (temp == null || isNaN(temp)) return '#5a5a60';
                if (temp < -10) return '#e0e0ff';
                if (temp < 0) return '#b0c4de';
                if (temp < 10) return '#87ceeb';
                if (temp < 15) return '#98fb98';
                if (temp < 20) return '#ffd700';
                if (temp < 25) return '#ffa500';
                if (temp < 30) return '#ff6347';
                return '#b22222';
            }

            function getCountryFill(d) {
                const name = d.properties?.name || '';
                if (colorMode === 'normal') return '#d4c5a0';
                if (colorMode === 'terrain') return getTerrainColor(getElevation(name));
                if (colorMode === 'density') return getDensityColor(getDensity(name));
                if (colorMode === 'precipitation') return getPrecipitationColor(getPrecipitation(name));
                if (colorMode === 'temperature') return getTempColor(getTemperature(name, d));
                if (sectMode) return denominationColors[getDenomination(name)] || '#4a4a55';
                const rel = getReligion(name);
                if (currentReligionFilter === 'all') return religionColors[rel] || '#4a4a55';
                if (rel === currentReligionFilter) return d3.color(religionColors[rel] || '#4a4a55').brighter(0.6)
                    .toString();
                return 'rgba(60,60,70,0.25)';
            }

            function getStroke(d) {
                if (colorMode === 'normal') return 'rgba(255,255,255,0.5)';
                const name = d.properties?.name || '';
                if (currentReligionFilter !== 'all' && getReligion(name) === currentReligionFilter) return '#fff';
                return 'rgba(255,255,255,0.4)';
            }

            function getStrokeWidth(d) { return 0.8; }

            function getOpacity(d) {
                if (colorMode === 'normal') return 0.95;
                if (currentReligionFilter === 'all') return 0.9;
                return (getReligion(d.properties?.name || '') === currentReligionFilter) ? 1 : 0.35;
            }

            function getCorridorColor() {
                if (colorMode === 'terrain') return '#ffeb3b';
                if (colorMode === 'density') return '#00e5ff';
                if (colorMode === 'precipitation') return '#00e5ff';
                if (colorMode === 'temperature') return '#00ffcc';
                if (colorMode === 'normal') return '#ff1744';
                return '#ff9100';
            }

            function getContinent(name) {
                if (!name) return 'Unknown';
                const clean = getCleanName(name);
                if (continentByCountry[clean]) return continentByCountry[clean];
                if (continentByCountry[name]) return continentByCountry[name];
                const feature = allCountryFeatures.find(f => f.properties?.name === name || getCleanName(f.properties
                    ?.name) === clean);
                if (feature && feature.geometry) {
                    const centroid = d3.geoCentroid(feature);
                    if (centroid && !isNaN(centroid[0])) {
                        const lat = centroid[1],
                            lon = centroid[0];
                        if (lat > 60) return 'Europe';
                        if (lat < -50) return 'Antarctica';
                        if (lon > -25 && lon < 50 && lat > -35 && lat < 37) return 'Africa';
                        if (lon > -130 && lon < -60 && lat > 20) return 'North America';
                        if (lon > -85 && lon < -30 && lat < 10) return 'South America';
                        if (lon > 70 && lon < 150 && lat > 10) return 'Asia';
                        if (lon > 110 && lon < 180 && lat < -10) return 'Oceania';
                        if (lon > -10 && lon < 40 && lat > 35) return 'Europe';
                    }
                }
                return 'Unknown';
            }

                if (governmentByCountry[clean]) return governmentByCountry[clean];
                if (governmentByCountry[name]) return governmentByCountry[name];
                return 'Unknown';

            // =====================================================================
            //  دوال الرسم الأساسية مع تحسين حجم النقاط للهواتف
            // =====================================================================
            function getContainerDimensions() {
                const r = mapContainer.getBoundingClientRect();
                return { width: r.width, height: r.height };
            }

            function setupProjection(w, h) {
                return d3.geoPolyhedralWaterman().scale(Math.min(w, h) * 0.38).translate([w / 2, h / 2]).rotate([0, 0])
                    .precision(0.3);
            }

            function createSvg() {
                const { width, height } = getContainerDimensions();
                svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
                svgEl.setAttribute('width', width);
                svgEl.setAttribute('height', height);
                svg = d3.select(svgEl);
                svg.selectAll('*').remove();

                const defs = svg.append('defs');
                defs.append('radialGradient')
                    .attr('id', 'oceanGradient')
                    .attr('cx', '50%').attr('cy', '50%').attr('r', '70%')
                    .selectAll('stop')
                    .data([
                        { offset: '0%', color: '#1a334a' },
                        { offset: '30%', color: '#152b3f' },
                        { offset: '60%', color: '#0f1f30' },
                        { offset: '100%', color: '#091520' }
                    ])
                    .join('stop')
                    .attr('offset', d => d.offset)
                    .attr('stop-color', d => d.color);

                const shadowFilter = defs.append('filter')
                    .attr('id', 'countryShadow')
                    .attr('x', '-10%').attr('y', '-10%')
                    .attr('width', '120%').attr('height', '120%');
                shadowFilter.append('feDropShadow')
                    .attr('dx', '0')
                    .attr('dy', '2')
                    .attr('stdDeviation', '4')
                    .attr('flood-color', 'rgba(0,0,0,0.6)')
                    .attr('flood-opacity', '0.5');

                gOcean = svg.append('g');
                gOcean.append('rect')
                    .attr('x', -500).attr('y', -500)
                    .attr('width', width + 1000).attr('height', height + 1000)
                    .attr('fill', 'url(#oceanGradient)');

                gGraticule = svg.append('g');
                gCountries = svg.append('g');
                gPhysical = svg.append('g');
                gCorridors = svg.append('g');
                gTemperature = svg.append('g');
                gCapitals = svg.append('g');
                gTimezones = svg.append('g');
                gMajorCities = svg.append('g');

                gMap = svg.append('g').attr('class', 'map-transform-group');
                [gOcean, gGraticule, gCountries, gPhysical, gCorridors, gTemperature, gCapitals, gTimezones, gMajorCities]
                    .forEach(g => gMap.append(() => g.node()));

                projection = setupProjection(width, height);
                pathGen = d3.geoPath(projection);
                // تعيين نصف قطر النقاط ليكون مناسباً للهواتف
                const isMobile = window.innerWidth < 768;
                pathGen.pointRadius(isMobile ? 1.5 : 3);
            }

            // =====================================================================
            //  دوال التسميات والإحداثيات
            // =====================================================================
            function getAreaThreshold() {
                const zoom = currentTransform.k;
                if (zoom > 1.5) return -1;
                let threshold = 0.001 / (zoom + 0.1);
                if (window.innerWidth < 768) threshold *= 1.2;
                return threshold;
            }

            function getLabelFontSize() {
                const baseSize = 9;
                const zoom = currentTransform.k || 1;
                let size = baseSize / zoom;
                size = Math.max(3, Math.min(14, size));
                if (window.innerWidth < 768) size *= 0.9;
                return size;
            }

            function drawCountryLabels(features) {
                if (countryLabelSelection) {
                    countryLabelSelection.remove();
                    countryLabelSelection = null;
                }
                if (!showLabels) return;

                const threshold = getAreaThreshold();
                const fontSize = getLabelFontSize();
                const labelGroup = gCountries.append('g').attr('class', 'country-label-group');
                features.forEach(d => {
                    const name = d.properties?.name || '';
                    const displayName = lang === 'ar' ? getArabicName(name) : name;
                    const area = d3.geoArea(d);
                    if (threshold >= 0 && area < threshold) return;

                    let centroid;
                    if (labelPositions[name]) {
                        const [lon, lat] = labelPositions[name];
                        centroid = projection([lon, lat]);
                    } else {
                        const c = d3.geoCentroid(d);
                        centroid = projection(c);
                    }
                    if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) {
                        try {
                            const c = d3.geoPath(projection).centroid(d);
                            if (c && !isNaN(c[0]) && !isNaN(c[1])) centroid = c;
                        } catch (e) {}
                    }
                    if (!centroid || isNaN(centroid[0]) || isNaN(centroid[1])) return;

                    const x = centroid[0],
                        y = centroid[1];
                    const text = labelGroup.append('text')
                        .attr('x', x).attr('y', y)
                        .attr('class', 'country-label')
                        .text(displayName)
                        .attr('font-size', fontSize + 'px')
                        .attr('fill', '#e0e0e0')
                        .attr('text-anchor', 'middle')
                        .attr('dominant-baseline', 'central')
                        .attr('vector-effect', 'non-scaling-stroke')
                        .attr('style', 'text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6)');
                    text.datum({ feature: d, area: area, name: name, displayName: displayName });
                });
                countryLabelSelection = labelGroup.selectAll('.country-label');
            }

            function updateLabels() {
                if (!countryLabelSelection) return;
                if (!showLabels) {
                    countryLabelSelection.style('opacity', 0);
                    return;
                }
                const threshold = getAreaThreshold();
                const fontSize = getLabelFontSize();
                countryLabelSelection.each(function(d) {
                    const el = d3.select(this);
                    const data = el.datum();
                    if (!data) return;
                    const area = data.area;
                    el.attr('font-size', fontSize + 'px');
                    if (threshold < 0) {
                        el.style('opacity', 1);
                    } else if (area < threshold) {
                        el.style('opacity', 0);
                    } else {
                        el.style('opacity', 1);
                    }
                    const newDisplay = lang === 'ar' ? getArabicName(data.name) : data.name;
                    if (el.text() !== newDisplay) el.text(newDisplay);
                });
            }

            function toggleLabels() {
                showLabels = !showLabels;
                labelsToggle.classList.toggle('toggle-on', showLabels);
                if (countryLabelSelection) {
                    countryLabelSelection.remove();
                    countryLabelSelection = null;
                }
                if (showLabels) {
                    drawCountryLabels(allCountryFeatures);
                } else {
                    gCountries.selectAll('.country-label-group').remove();
                    countryLabelSelection = null;
                }
                updateLegend();
                updateHash();
            }

            function updateCoordinatesDisplay(event) {
                if (!coordsVisible) {
                    coordinatesDisplay.classList.add('hidden');
                    return;
                }
                coordinatesDisplay.classList.remove('hidden');
                const rect = mapContainer.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                const coords = projection.invert([x, y]);
                if (coords && !isNaN(coords[0]) && !isNaN(coords[1])) {
                    const lon = coords[0].toFixed(2);
                    const lat = coords[1].toFixed(2);
                    const modeLabel = t(`mode_${colorMode}`) || colorMode;
                    const filterLabel = t(`religion_${currentReligionFilter}`) || currentReligionFilter;
                    const zoom = currentTransform.k.toFixed(1);
                    coordinatesDisplay.textContent =
                        `خط الطول: ${lon} | خط العرض: ${lat} | تكبير: ${zoom}x | الوضع: ${modeLabel} | الفلتر: ${filterLabel}`;
                } else {
                    coordinatesDisplay.textContent =
                        `خط الطول: — | خط العرض: — | تكبير: ${currentTransform.k.toFixed(1)}x | الوضع: ${t(`mode_${colorMode}`) || colorMode} | الفلتر: ${t(`religion_${currentReligionFilter}`) || currentReligionFilter}`;

            }

            function updateAllStyles() {
                if (!countryPaths) return;
                countryPaths.transition().duration(400)
                    .attr('fill', d => getCountryFill(d))
                    .attr('stroke', d => getStroke(d))
                    .attr('stroke-width', d => getStrokeWidth(d))
                    .attr('opacity', d => getOpacity(d))
                    .style('filter', 'url(#countryShadow)');
                if (countryLabelSelection) {
                    countryLabelSelection.remove();
                    countryLabelSelection = null;
                }
                drawCountryLabels(allCountryFeatures);
                drawPhysicalFeatures();
                drawCorridors();
                drawDensitySpots();
                drawCapitals();
                drawTimezones();
                drawMajorCities();
                updateLegend();
                if (selectedCountry && countryPanel.style.display === 'block' && !compareCountry) renderCountryPanel(
                    selectedCountry);
                if (selectedCountry) highlightSelectedCountry(selectedCountry);
                updateHash();
            }

            function highlightSelectedCountry(d) {
                countryPaths.attr('stroke', d => getStroke(d)).attr('stroke-width', d => getStrokeWidth(d)).style(

                    countryPaths.filter(p => p === d)

            function updateLegend() {
                let html = '';
                if (colorMode === 'terrain') {
                    html += `<div style="font-weight:700">${t('terrainLegend')}</div>`;
                    const unit = t('elevationUnit');
                    [
                        { l: `<0${unit}`, c: getTerrainColor(-1) },
                        { l: `0-200`, c: getTerrainColor(100) },
                        { l: `200-700`, c: getTerrainColor(500) },
                        { l: `700-2000`, c: getTerrainColor(1500) },
                        { l: `>3000`, c: getTerrainColor(3500) }
                    ].forEach(r => html +=
                        `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`
                        );
                } else if (colorMode === 'density') {
                    html += `<div style="font-weight:700">${t('densityLegend')}</div>`;
                    [
                        { l: '<10', c: getDensityColor(5) },
                        { l: '10-100', c: getDensityColor(50) },
                        { l: '100-500', c: getDensityColor(300) },
                        { l: '>500', c: getDensityColor(800) }
                    ].forEach(r => html +=
                        `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`
                        );
                } else if (colorMode === 'precipitation') {
                    html += `<div style="font-weight:700">${t('precipitationLegend')}</div>`;
                    [
                        { l: '<100', c: getPrecipitationColor(50) },
                        { l: '100-600', c: getPrecipitationColor(300) },
                        { l: '600-1500', c: getPrecipitationColor(1000) },
                        { l: '1500-3000', c: getPrecipitationColor(2000) },
                        { l: '>3000', c: getPrecipitationColor(3500) }
                    ].forEach(r => html +=
                        `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`
                        );
                } else if (colorMode === 'temperature') {
                    html += `<div style="font-weight:700">${t('temperatureLegend')}</div>`;
                    [
                        { l: '<0°C', c: getTempColor(-5) },
                        { l: '0-10°C', c: getTempColor(5) },
                        { l: '10-20°C', c: getTempColor(15) },
                        { l: '20-30°C', c: getTempColor(25) },

                    ].forEach(r => html +=
                        `<div class="legend-item"><span class="legend-color" style="background:${r.c}"></span>${r.l}</div>`
                        );

                    html += `<div>${t('normalLegend')}</div>`;

                    html += `<div>${t('religionLegend')}</div>`;
                    Object.entries(sectMode ? denominationColors : religionColors).forEach(([k, v]) => {

            // =====================================================================
            //  الطيران إلى الدولة
            // =====================================================================
            function flyToCountry(name) {
                const feature = allCountryFeatures.find(f => f.properties?.name === name);
                if (!feature) {
                    for (let f of allCountryFeatures) {
                        if (getArabicName(f.properties?.name) === name) {
                            flyToCountry(f.properties?.name);
                            return;
                        }
                    }
                    return;
                }
                const centroid = d3.geoCentroid(feature);
                if (!centroid || isNaN(centroid[0])) return;
                const { width, height } = getContainerDimensions();
                const [px, py] = projection(centroid);
                const targetX = width / 2 - px * 3;
                const targetY = height / 2 - py * 3;
                const transform = d3.zoomIdentity.translate(targetX, targetY).scale(3);
                svg.transition().duration(800).call(zoomBehavior.transform, transform)
                    .on('end', () => {
                        highlightCountry(feature);
                    });
            }

            function highlightCountry(feature) {
                if (!feature || !countryPaths) return;
                countryPaths.classed('highlighted-country', false);
                const path = countryPaths.filter(d => d === feature);
                path.classed('highlighted-country', true);
                if (highlightTimeout) clearTimeout(highlightTimeout);
                highlightTimeout = setTimeout(() => {
                    countryPaths.classed('highlighted-country', false);
                }, 3000);
            }

                        'Greenland', 'Puerto Rico'
                    ]);
                    const observesDST = dstCountriesList.has(name) || dstCountriesList.has(cleanName);
                    let isDST = false;
                    if (observesDST) {
                        const isNorth = baseOffset >= -5 && baseOffset <= 4;
                        if (isNorth) {
                            isDST = (month >= 2 && month <= 9);
                        } else {
                            isDST = (month <= 2 || month >= 9);
                        }
                    }
                    const currentOffset = observesDST && isDST ? baseOffset + 1 : baseOffset;
                    const sign = currentOffset >= 0 ? '+' : '';
                    const utcHours = now.getUTCHours() + currentOffset;
                    const localHours = ((utcHours % 24) + 24) % 24;
                    const localMinutes = String(now.getUTCMinutes()).padStart(2, '0');
                    let dstInfo = '';
                    if (observesDST) {
                        const stdSign = baseOffset >= 0 ? '+' : '';
                        const dstSign = (baseOffset + 1) >= 0 ? '+' : '';
                        if (isDST) {
                            dstInfo =
                                ` (${t('dstActive')}، UTC${stdSign}${baseOffset} ${t('dstInactive')} -> UTC${dstSign}${baseOffset+1} ${t('dstActive')})`;
                        } else {
                            dstInfo =
                                ` (${t('dstInactive')}، UTC${dstSign}${baseOffset+1} ${t('dstActive')} -> UTC${stdSign}${baseOffset} ${t('dstInactive')})`;
                        }
                    }
                    localTimeStr = `${String(localHours).padStart(2, '0')}:${localMinutes} (UTC${sign}${currentOffset}${dstInfo})`;

            function renderComparePanel(d1, d2) {
                const name1 = d1.properties?.name || '';
                const name2 = d2.properties?.name || '';
                const displayName1 = lang === 'ar' ? getArabicName(name1) : name1;
                const displayName2 = lang === 'ar' ? getArabicName(name2) : name2;
                const info1 = countryInfo[name1] || countryInfo[getCleanName(name1)];
                const info2 = countryInfo[name2] || countryInfo[getCleanName(name2)];
                const area1 = info1 ? info1.area : null;
                const area2 = info2 ? info2.area : null;
                const dens1 = getDensity(name1);
                const dens2 = getDensity(name2);
                const pop1 = info1 ? info1.population_2026 : null;
                const pop2 = info2 ? info2.population_2026 : null;
                const rel1 = getReligion(name1);
                const rel2 = getReligion(name2);
                const relLabel1 = (lang === 'ar' && religionArabic[rel1]) ? religionArabic[rel1] : rel1;
                const relLabel2 = (lang === 'ar' && religionArabic[rel2]) ? religionArabic[rel2] : rel2;

                const maxArea = Math.max(area1 || 1, area2 || 1);
                const maxPop = Math.max(pop1 || 1, pop2 || 1);
                const maxDens = Math.max(dens1 || 1, dens2 || 1);

                let html = `<h3>📊 ${t('compareTitle')} ${displayName1} ↔ ${displayName2}</h3>`;
                html +=
                    `<table style="width:100%;font-size:0.85em;text-align:center;border-collapse:collapse;">`;
                html +=
                    `<tr><th style="padding:4px;"></th><th style="padding:4px;">${displayName1}</th><th style="padding:4px;">${displayName2}</th></tr>`;

                const bar1Area = area1 ? (area1 / maxArea * 100) : 0;
                const bar2Area = area2 ? (area2 / maxArea * 100) : 0;
                html += `<tr><td style="padding:4px;">${t('areaTitle')}</td>
                            <td style="padding:4px;">${area1 ? area1.toLocaleString('en') + ' km²' : '?'}<br><span class="compare-bar" style="width:${bar1Area}%;background:#42a5f5;"></span></td>
                            <td style="padding:4px;">${area2 ? area2.toLocaleString('en') + ' km²' : '?'}<br><span class="compare-bar" style="width:${bar2Area}%;background:#42a5f5;"></span></td>
                        </tr>`;

                const bar1Dens = dens1 ? (dens1 / maxDens * 100) : 0;
                const bar2Dens = dens2 ? (dens2 / maxDens * 100) : 0;
                html += `<tr><td style="padding:4px;">${t('densityTitle')}</td>
                            <td style="padding:4px;">${dens1} ${t('densityUnit')}<br><span class="compare-bar" style="width:${bar1Dens}%;background:#ffa726;"></span></td>
                            <td style="padding:4px;">${dens2} ${t('densityUnit')}<br><span class="compare-bar" style="width:${bar2Dens}%;background:#ffa726;"></span></td>

                html += `<tr><td style="padding:4px;">${t('populationTitle')}</td>
                            <td style="padding:4px;">${pop1 ? '~' + pop1 + ' ' + t('million') : '?'}<br><span class="compare-bar" style="width:${bar1Pop}%;background:#66bb6a;"></span></td>
                            <td style="padding:4px;">${pop2 ? '~' + pop2 + ' ' + t('million') : '?'}<br><span class="compare-bar" style="width:${bar2Pop}%;background:#66bb6a;"></span></td>
                        </tr>`;

                html += `<tr><td style="padding:4px;">${t('tooltipReligion')}</td>
                            <td style="padding:4px;">${relLabel1}</td>
                            <td style="padding:4px;">${relLabel2}</td>
                        </tr>`;
                html += `</table>`;

                html += `<br><button class="btn" id="closeCompareBtn">${t('closeCompare')}</button>`;
                panelContent.innerHTML = html;
                countryPanel.style.display = 'block';

                document.getElementById('closeCompareBtn')?.addEventListener('click', () => {
                    compareCountry = null;
                    if (selectedCountry) renderCountryPanel(selectedCountry);
                });
            }

            // =====================================================================
            //  الهاش والمشاركة

            function updateHash() {
                const hash = new URLSearchParams();
                hash.set('lang', lang);
                hash.set('mode', colorMode);
                hash.set('filter', currentReligionFilter);
                hash.set('labels', showLabels ? '1' : '0');
                hash.set('sect', sectMode ? '1' : '0');
                hash.set('corridors', corridorsVisible ? '1' : '0');
                hash.set('spots', densitySpotsMode ? '1' : '0');
                hash.set('capitals', capitalsVisible ? '1' : '0');
                hash.set('timezones', timezonesVisible ? '1' : '0');
                hash.set('majorcities', majorCitiesVisible ? '1' : '0');
                hash.set('coords', coordsVisible ? '1' : '0');
                hash.set('k', currentTransform.k.toFixed(2));
                hash.set('x', currentTransform.x.toFixed(0));
                hash.set('y', currentTransform.y.toFixed(0));
                window.location.hash = hash.toString();
            }

            function loadFromHash() {
                try {
                    const hash = new URLSearchParams(window.location.hash.substring(1));
                    if (hash.has('lang')) setLanguage(hash.get('lang'));
                    if (hash.has('mode')) setMode(hash.get('mode'));
                    if (hash.has('filter')) {
                        currentReligionFilter = hash.get('filter');
                        religionButtons.forEach(b => b.classList.remove('active'));
                        const btn = document.querySelector(
                            `.religion-btn[data-religion="${currentReligionFilter}"]`);
                        if (btn) btn.classList.add('active');
                    }
                    if (hash.get('labels') === '1' && !showLabels) toggleLabels();
                    if (hash.get('sect') === '1' && !sectMode) toggleSect();
                    if (hash.get('corridors') === '1' && !corridorsVisible) toggleCorridors();
                    if (hash.get('spots') === '1' && !densitySpotsMode) toggleDensitySpots();
                    if (hash.get('capitals') === '1' && !capitalsVisible) toggleCapitals();
                    if (hash.get('timezones') === '1' && !timezonesVisible) toggleTimezones();
                    if (hash.get('majorcities') === '1' && !majorCitiesVisible) toggleMajorCities();
                    if (hash.get('coords') === '0') {
                        coordsVisible = false;
                        coordsToggle.classList.remove('toggle-on');
                        coordinatesDisplay.classList.add('hidden');
                    } else {
                        coordsVisible = true;
                        coordsToggle.classList.add('toggle-on');
                        coordinatesDisplay.classList.remove('hidden');
                    }
                    if (hash.has('k') && hash.has('x') && hash.has('y')) {
                        const k = +hash.get('k'),
                            x = +hash.get('x'),
                            y = +hash.get('y');
                        if (!isNaN(k) && !isNaN(x) && !isNaN(y))
                            svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(x, y).scale(k));
                    }
                } catch (e) {}
            }

            function copyCurrentLink() {
                const url = window.location.href.split('#')[0] + window.location.hash;
                navigator.clipboard.writeText(url).then(() => {
                    copyNotification.textContent = t('copySuccess');
                    copyNotification.classList.add('show');
                    setTimeout(() => copyNotification.classList.remove('show'), 2000);
                }).catch(() => {
                    copyNotification.textContent = t('copyFail');
                    copyNotification.classList.add('show');
                    setTimeout(() => copyNotification.classList.remove('show'), 2000);
                });
            }

            function shareMap() {
                const url = window.location.href.split('#')[0] + window.location.hash;
                const modeLabel = t(`mode_${colorMode}`) || colorMode;
                const text = t('shareText', { mode: modeLabel });
                if (navigator.share) {
                    navigator.share({
                        title: t('shareTitle'),
                        text: text,
                        url: url
                    }).catch(() => {});
                } else {
                    copyCurrentLink();
                }
            }

                religionButtons.forEach(b => b.classList.remove('active'));
                document.querySelector('.religion-btn[data-religion="all"]').classList.add('active');
                setMode('religion');
                if (showLabels) toggleLabels();
                if (sectMode) toggleSect();
                if (corridorsVisible) toggleCorridors();
                if (densitySpotsMode) toggleDensitySpots();
                if (capitalsVisible) toggleCapitals();
                if (timezonesVisible) toggleTimezones();
                if (majorCitiesVisible) toggleMajorCities();
                if (!coordsVisible) toggleCoords();

                selectedCountry = null;
                compareCountry = null;
                highlightSelectedCountry(null);
                countryPanel.style.display = 'none';

            // =====================================================================
            //  لوحة المفاتيح
            // =====================================================================
            function setupKeyboard() {
                document.addEventListener('keydown', function(e) {
                    if (e.target.tagName === 'INPUT') return;
                    const code = e.code;
                    if (code === 'KeyR') setMode('religion');
                    else if (code === 'KeyT') setMode('terrain');
                    else if (code === 'KeyD') setMode('density');
                    else if (code === 'KeyP') setMode('precipitation');
                    else if (code === 'KeyH') setMode('temperature');
                    else if (code === 'KeyN') setMode('normal');
                    else if (code === 'KeyA') toggleCapitals();
                    else if (code === 'KeyZ') toggleTimezones();
                    else if (code === 'KeyL') toggleLabels();
                    else if (code === 'KeyM') toggleMajorCities();
                    else if (code === 'KeyC') toggleCorridors();
                    else if (code === 'KeyB') toggleDensitySpots();
                    else if (code === 'KeyS' && e.ctrlKey) { e.preventDefault();
                        toggleSect(); } else if (code === 'Digit1') { currentReligionFilter = 'all';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Digit2') { currentReligionFilter = 'muslim';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Digit3') { currentReligionFilter = 'christian';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Digit4') { currentReligionFilter = 'hindu';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Digit5') { currentReligionFilter = 'buddhist';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Digit6') { currentReligionFilter = 'jewish';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Digit7') { currentReligionFilter = 'other';
                        updateReligionButtons();
                        updateAllStyles(); } else if (code === 'Escape') { resetBtn.click(); } else if (code ===
                        'Equal' || code === 'NumpadAdd') { svg.transition().duration(300).call(zoomBehavior
                        .scaleBy, 1.35); } else if (code === 'Minus' || code === 'NumpadSubtract') { svg
                        .transition().duration(300).call(zoomBehavior.scaleBy, 0.74); }
                });
            }

            function updateReligionButtons() {
                religionButtons.forEach(b => b.classList.remove('active'));
                const btn = document.querySelector(`.religion-btn[data-religion="${currentReligionFilter}"]`);
                if (btn) btn.classList.add('active');
            }

                const loadingMsg = document.createElement('div');
                loadingMsg.style.cssText =
                    'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.2em;z-index:5;background:rgba(0,0,0,0.5);padding:12px 24px;border-radius:12px;';
                loadingMsg.textContent = 'جاري تحميل الخريطة...';
                mapContainer.appendChild(loadingMsg);

                const features = await loadWorld();
                loadingMsg.remove();

                renderCountries(features);
                applyLanguage();
                loadFromHash();
                updateHash();

                mapContainer.addEventListener('mousemove', updateCoordinatesDisplay);

                window.addEventListener('resize', () => {
                    const { width, height } = getContainerDimensions();
                    svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
                    svgEl.setAttribute('width', width);
                    svgEl.setAttribute('height', height);
                    projection = setupProjection(width, height);
                    pathGen = d3.geoPath(projection);
                    const isMobile = window.innerWidth < 768;
                    pathGen.pointRadius(isMobile ? 1.5 : 3);
                    gOcean.select('rect').attr('width', width + 1000).attr('height', height + 1000);
                    drawGraticule();
                    if (allCountryFeatures.length) {
                        gCountries.selectAll('path').attr('d', pathGen);
                        if (countryLabelSelection) {
                            countryLabelSelection.remove();
                            countryLabelSelection = null;
                        }
                        drawCountryLabels(allCountryFeatures);
                    }
                    drawPhysicalFeatures();
                    drawCorridors();
                    drawDensitySpots();
                    drawCapitals();
                    drawTimezones();
                    drawMajorCities();
                    svg.call(zoomBehavior.transform, currentTransform);
                });

                if ('serviceWorker' in navigator) {
                    const basePath = window.location.pathname.replace(/\/[^\/]*$/, '/');
                    navigator.serviceWorker.register(basePath + 'sw.js', { scope: basePath })
                        .then(reg => console.log('✅ Service Worker مسجل بنجاح:', reg))
                        .catch(err => console.error('❌ فشل تسجيل Service Worker:', err));
                }

                console.log('🦋 جميع التحسينات مطبقة بنجاح!');
            }

            // =====================================================================
            //  ربط الأحداث النهائي
            // =====================================================================
            modeButtons.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
            labelsToggle.addEventListener('click', toggleLabels);
            sectToggle.addEventListener('click', toggleSect);
            corridorsToggle.addEventListener('click', toggleCorridors);
            densitySpotsToggle.addEventListener('click', toggleDensitySpots);
            capitalsToggle.addEventListener('click', toggleCapitals);
            timezonesToggle.addEventListener('click', toggleTimezones);
            majorCitiesToggle.addEventListener('click', toggleMajorCities);
            coordsToggle.addEventListener('click', toggleCoords);

            langToggle.addEventListener('click', () => setLanguage(lang === 'ar' ? 'en' : 'ar'));

            religionButtons.forEach(b => b.addEventListener('click', () => {
                currentReligionFilter = b.dataset.religion;
                religionButtons.forEach(bb => bb.classList.remove('active'));
                b.classList.add('active');
                updateAllStyles();
            }));

            zoomInBtn.addEventListener('click', () => { svg.transition().duration(300).call(zoomBehavior.scaleBy,
                1.35); });
            zoomOutBtn.addEventListener('click', () => { svg.transition().duration(300).call(zoomBehavior.scaleBy,
                0.74); });
            zoomResetBtn.addEventListener('click', resetZoom);
            copyLinkBtn.addEventListener('click', copyCurrentLink);
            shareBtn.addEventListener('click', shareMap);
            resetBtn.addEventListener('click', resetAll);

            closePanelBtn.addEventListener('click', () => {
                countryPanel.style.display = 'none';
                selectedCountry = null;
                compareCountry = null;
                highlightSelectedCountry(null);
            });
            exportBtn.addEventListener('click', function() {
                if (!selectedCountry) return;
                const name = selectedCountry.properties?.name || '';
                const info = countryInfo[name] || countryInfo[getCleanName(name)];
                let text = `Country: ${name}\n`;
                if (info) {
                    text += `Capital: ${info.capital_en}\n`;
                    text += `Area: ${info.area} km²\n`;
                    text += `Population (2026 est.): ${info.population_2026} million\n`;
                    text += `Language: ${info.lang_en}\n`;
                    text += `Density: ${getDensity(name)} people/km²\n`;
                }
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${t('exportFilename')}_${name.replace(/\s/g,'_')}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            });

            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    const isActive = controlsBar.classList.toggle('active');
                    this.classList.toggle('active');
                    const legend = document.getElementById('legend');
                    if (isActive) {
                        legend.style.display = 'none';
                    } else {
                        legend.style.display = 'flex';
                    }
                });
            }

            init();
        })();
    </script>

</body>
</html>
